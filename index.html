<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compliance Workplan Suite</title>
    
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-database-compat.js"></script>

    <style>
        body { margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        .overflow-visible { overflow: visible !important; }
        .prose h1, .prose h2, .prose h3 { margin-top: 1.5em; margin-bottom: 0.5em; color: #1e293b; }
        .prose p { margin-top: 0.5em; margin-bottom: 0.5em; }
        .prose ul { margin-top: 0.5em; margin-bottom: 1em; }
        .prose li { margin-top: 0.25em; margin-bottom: 0.25em; }
        .select-text { user-select: text !important; -webkit-user-select: text !important; }
        
        /* Hide scrollbar for the top tabs */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useRef, useEffect } = React;

        // --- 1. Inline Native SVG Icons ---
        const SVGIcon = ({ d, children, size=24, className="" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                {d ? <path d={d} /> : children}
            </svg>
        );

        const IconPlus = (p) => <SVGIcon {...p}><path d="M5 12h14"/><path d="M12 5v14"/></SVGIcon>;
        const IconTrash2 = (p) => <SVGIcon {...p}><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></SVGIcon>;
        const IconLayoutList = (p) => <SVGIcon {...p}><rect width="7" height="7" x="3" y="3" rx="1"/><rect width="7" height="7" x="3" y="14" rx="1"/><path d="M14 4h7"/><path d="M14 9h7"/><path d="M14 15h7"/><path d="M14 20h7"/></SVGIcon>;
        const IconBarChart3 = (p) => <SVGIcon {...p}><path d="M3 3v18h18"/><path d="M18 17V9"/><path d="M13 17V5"/><path d="M8 17v-3"/></SVGIcon>;
        const IconEdit = (p) => <SVGIcon {...p}><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></SVGIcon>;
        const IconX = (p) => <SVGIcon {...p}><path d="M18 6 6 18"/><path d="m6 6 12 12"/></SVGIcon>;
        const IconUndo = (p) => <SVGIcon {...p}><path d="M3 7v6h6"/><path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"/></SVGIcon>;
        const IconRedo = (p) => <SVGIcon {...p}><path d="M21 7v6h-6"/><path d="M3 17a9 9 0 0 1 9-9 9 9 0 0 1 6 2.3l3 2.7"/></SVGIcon>;
        const IconDownload = (p) => <SVGIcon {...p}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></SVGIcon>;
        const IconRefreshCw = (p) => <SVGIcon {...p}><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></SVGIcon>;
        const IconAlertCircle = (p) => <SVGIcon {...p}><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></SVGIcon>;
        const IconMaximize = (p) => <SVGIcon {...p}><path d="M8 3H5a2 2 0 0 0-2 2v3"/><path d="M21 8V5a2 2 0 0 0-2-2h-3"/><path d="M3 16v3a2 2 0 0 0 2 2h3"/><path d="M16 21h3a2 2 0 0 0 2-2v-3"/></SVGIcon>;
        const IconMinimize = (p) => <SVGIcon {...p}><path d="M8 3v3a2 2 0 0 1-2 2H3"/><path d="M21 8h-3a2 2 0 0 1-2-2V3"/><path d="M3 16h3a2 2 0 0 1 2 2v3"/><path d="M16 21v-3a2 2 0 0 1 2-2h3"/></SVGIcon>;
        const IconGripHorizontal = (p) => <SVGIcon {...p}><circle cx="12" cy="9" r="1"/><circle cx="19" cy="9" r="1"/><circle cx="5" cy="9" r="1"/><circle cx="12" cy="15" r="1"/><circle cx="19" cy="15" r="1"/><circle cx="5" cy="15" r="1"/></SVGIcon>;
        const IconClock = (p) => <SVGIcon {...p}><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></SVGIcon>;
        const IconFileText = (p) => <SVGIcon {...p}><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="16" x2="8" y1="13" y2="13"/><line x1="16" x2="8" y1="17" y2="17"/><line x1="10" x2="8" y1="9" y2="9"/></SVGIcon>;
        const IconGlobe = (p) => <SVGIcon {...p}><circle cx="12" cy="12" r="10"/><line x1="2" x2="22" y1="12" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></SVGIcon>;
        const IconCheckCircle2 = (p) => <SVGIcon {...p}><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></SVGIcon>;
        const IconBrain = (p) => <SVGIcon {...p}><path d="M9.5 2A2.5 2.5 0 0 1 12 4.5v15a2.5 2.5 0 0 1-4.96.44 2.5 2.5 0 0 1-2.96-3.08 3 3 0 0 1-.34-5.58 2.5 2.5 0 0 1 1.32-4.24 2.5 2.5 0 0 1 1.98-3A2.5 2.5 0 0 1 9.5 2Z"/><path d="M14.5 2A2.5 2.5 0 0 0 12 4.5v15a2.5 2.5 0 0 0 4.96.44 2.5 2.5 0 0 0 2.96-3.08 3 3 0 0 0 .34-5.58 2.5 2.5 0 0 0-1.32-4.24 2.5 2.5 0 0 0-1.98-3A2.5 2.5 0 0 0 14.5 2Z"/></SVGIcon>;
        const IconChevronDown = (p) => <SVGIcon {...p}><path d="m6 9 6 6 6-6"/></SVGIcon>;

        // --- 2. Constants ---
        const CLASSIFICATIONS = ['Governance & Oversight', 'Risk Assessment & Framework', 'Systems & Technology', 'Operational Processes', 'Team Training', 'Regulatory Readiness'];
        const STATUSES = ['Not Started', 'In Progress', 'Completed'];
        const DEPENDENCIES = ['RISPL', 'External'];
        const DEPARTMENTS = ['Finance', 'Product', 'Legal', 'Risk', 'Operations', 'IT'];
        const SCHEDULE_TYPES = ['Absolute Date', 'T + X Trigger'];
        const TRIGGER_EVENTS = ['IPA', 'Final License Grant', 'Go-Live'];

        const CLASSIFICATION_COLORS = {
            'Governance & Oversight': 'bg-purple-500', 'Risk Assessment & Framework': 'bg-red-500',
            'Systems & Technology': 'bg-blue-500', 'Operational Processes': 'bg-emerald-500',
            'Team Training': 'bg-yellow-500', 'Regulatory Readiness': 'bg-orange-500'
        };

        const STATUS_COLORS = {
            'Not Started': 'bg-gray-200 text-gray-700 border-gray-300',
            'In Progress': 'bg-blue-100 text-blue-800 border-blue-300',
            'Completed': 'bg-green-100 text-green-800 border-green-300'
        };

        const FY_START_YEAR = 2026;
        const FY_START_MONTH = 3; 

        const generateId = () => typeof crypto !== 'undefined' && crypto.randomUUID ? crypto.randomUUID() : Date.now().toString(36) + Math.random().toString(36).substring(2);

        const snapDate = (dateObj) => {
            const d = new Date(dateObj);
            const day = d.getDate();
            const lastDay = new Date(d.getFullYear(), d.getMonth() + 1, 0).getDate();
            const min = Math.min(day - 1, Math.abs(day - 15), lastDay - day);
            if (min === day - 1) d.setDate(1);
            else if (min === Math.abs(day - 15)) d.setDate(15);
            else d.setDate(lastDay);
            return d;
        };

        const MarkdownParser = ({ text }) => {
            const html = window.marked ? window.marked.parse(text) : text;
            return <div dangerouslySetInnerHTML={{ __html: html }} className="prose prose-slate prose-sm max-w-none text-slate-700 w-full" />;
        };

        // --- 3. Main Component ---
        function ComplianceGantt() {
            // Data Architecture
            const [charts, setCharts] = useState([]);
            const [activeTab, setActiveTab] = useState(''); 
            
            // Undo/Redo Engine
            const [history, setHistory] = useState([]);
            const [historyStep, setHistoryStep] = useState(-1);
            
            // UI States
            const [view, setView] = useState('timeline');
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [editingId, setEditingId] = useState(null);
            const [loading, setLoading] = useState(true);
            const [notification, setNotification] = useState('');
            const [isFullscreen, setIsFullscreen] = useState(false);
            const [isCustomTrigger, setIsCustomTrigger] = useState(false);
            const [isPdfMode, setIsPdfMode] = useState(false);
            const [showExportMenu, setShowExportMenu] = useState(false);
            const [editingTabId, setEditingTabId] = useState(null);
            const [dragState, setDragState] = useState(null); 
            const [deleteConfirmId, setDeleteConfirmId] = useState(null);
            const [timelineScale, setTimelineScale] = useState('months');

            // Dual AI Engine Logic
            const [aiEngine, setAiEngine] = useState(localStorage.getItem('ai_engine_pref') || 'gemini'); 
            const [geminiKey, setGeminiKey] = useState(localStorage.getItem('gemini_api_key') || '');
            const [openRouterKey, setOpenRouterKey] = useState(localStorage.getItem('openrouter_api_key') || '');
            const [aiResponse, setAiResponse] = useState('');
            const [isAiLoading, setIsAiLoading] = useState(false);
            const [customPrompt, setCustomPrompt] = useState('');

            const [newTask, setNewTask] = useState({
                title: '', description: '', classification: CLASSIFICATIONS[0], status: STATUSES[0],
                dependency: DEPENDENCIES[0], department: '', scheduleType: 'Absolute Date', triggerEvent: TRIGGER_EVENTS[0],
                triggerOffset: 30, startDate: '2026-04-01', endDate: '2026-04-30'
            });

            const isRemoteUpdate = useRef(false);
            const containerRef = useRef(null);
            const timelineGridRef = useRef(null);
            const exportMenuRef = useRef(null);

            // SAFELY derive active tasks to prevent "Object instead of Array" crashes
            const activeChart = charts.find(c => c.id === activeTab) || { id: 'dummy', name: '', tasks: [] };
            const rawTasks = activeChart.tasks || [];
            const tasks = Array.isArray(rawTasks) ? rawTasks : Object.values(rawTasks);

            // Filtering variables required for the interface
            const absoluteTasks = tasks.filter(t => (t.scheduleType || 'Absolute Date') === 'Absolute Date');
            const triggerTasks = tasks.filter(t => t.scheduleType === 'T + X Trigger');

            // --- History Wrapper ---
            const updateCharts = (newCharts, isUndoRedo = false) => {
                if (!isUndoRedo) {
                    const newHistory = history.slice(0, historyStep + 1);
                    newHistory.push(JSON.stringify(newCharts));
                    if (newHistory.length > 50) newHistory.shift(); 
                    setHistory(newHistory);
                    setHistoryStep(newHistory.length - 1);
                }
                setCharts(newCharts);
            };

            const updateActiveChartTasks = (newTasks) => {
                const newCharts = charts.map(c => c.id === activeTab ? { ...c, tasks: newTasks } : c);
                updateCharts(newCharts);
            };

            const undo = () => {
                if (historyStep > 0) {
                    const prevCharts = JSON.parse(history[historyStep - 1]);
                    isRemoteUpdate.current = true; // Block syncing back during undo execution
                    setCharts(prevCharts);
                    setHistoryStep(historyStep - 1);
                    showNotification("Action Undone");
                }
            };

            const redo = () => {
                if (historyStep < history.length - 1) {
                    const nextCharts = JSON.parse(history[historyStep + 1]);
                    isRemoteUpdate.current = true;
                    setCharts(nextCharts);
                    setHistoryStep(historyStep + 1);
                    showNotification("Action Redone");
                }
            };

            // Keyboard Shortcuts
            useEffect(() => {
                const handleKeyDown = (e) => {
                    const isMod = e.ctrlKey || e.metaKey;
                    if (isMod && e.key.toLowerCase() === 'z') {
                        e.preventDefault();
                        if (e.shiftKey) redo(); else undo();
                    }
                    if (isMod && e.key.toLowerCase() === 'y') {
                        e.preventDefault();
                        redo();
                    }
                };
                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, [historyStep, history]);

            // --- Bulletproof Firebase Init & Auto-Migrate ---
            useEffect(() => {
                try {
                    const firebaseConfig = {
                        apiKey: "AIzaSyDBUGby8pv_YzFrED7kQm1nMydxwbzArew",
                        authDomain: "compliance-json-storage.firebaseapp.com",
                        databaseURL: "https://compliance-json-storage-default-rtdb.asia-southeast1.firebasedatabase.app",
                        projectId: "compliance-json-storage",
                        storageBucket: "compliance-json-storage.firebasestorage.app",
                        messagingSenderId: "94949340652",
                        appId: "1:94949340652:web:f49aa96d667480e7433cc9"
                    };

                    if (!window.firebase.apps.length) window.firebase.initializeApp(firebaseConfig);
                    const db = window.firebase.database();

                    // Centralized Listener Setup (Placed above usage to prevent hoisting issues)
                    const setupFirebaseListener = (ref) => {
                        window.firebaseDbRef = ref;
                        ref.on('value', snap => {
                            const val = snap.val();
                            
                            // BULLETPROOFING: Force Firebase Objects back into pure Arrays
                            let chartsArray = [];
                            if (val) {
                                chartsArray = Array.isArray(val) ? val : Object.values(val);
                            }
                            
                            // Ensure nested tasks are also pure arrays
                            const safeCharts = chartsArray.map(c => ({
                                ...c,
                                tasks: c.tasks ? (Array.isArray(c.tasks) ? c.tasks : Object.values(c.tasks)) : []
                            }));

                            isRemoteUpdate.current = true;
                            setCharts(safeCharts);
                            
                            // Set Active Tab if none selected
                            setActiveTab(prev => prev || (safeCharts.length > 0 ? safeCharts[0].id : ''));
                            
                            setHistory(prevHistory => {
                                if (prevHistory.length === 0) {
                                    setHistoryStep(0);
                                    return [JSON.stringify(safeCharts)];
                                }
                                return prevHistory;
                            });
                            
                            setLoading(false);
                        });
                    };
                    
                    // One-time check for database structure migration
                    db.ref('sharedData').once('value', snapshot => {
                        const data = snapshot.val() || {};
                        if (data.charts) {
                            // Standard load for V2 Database
                            setupFirebaseListener(db.ref('sharedData/charts'));
                        } else if (data.tasks) {
                            // Auto-Migrate Legacy V1 Database to V2 Tab Structure
                            const safeTasks = Array.isArray(data.tasks) ? data.tasks : Object.values(data.tasks);
                            const migratedCharts = [{ id: generateId(), name: 'Legacy Workplan', tasks: safeTasks }];
                            db.ref('sharedData/charts').set(migratedCharts);
                            setupFirebaseListener(db.ref('sharedData/charts'));
                            showNotification("Legacy data safely auto-migrated to Multi-Tab structure.");
                        } else {
                            // Brand New Empty Database
                            const initialCharts = [{ id: generateId(), name: 'New Chart 1', tasks: [] }];
                            db.ref('sharedData/charts').set(initialCharts);
                            setupFirebaseListener(db.ref('sharedData/charts'));
                        }
                    });

                } catch (error) {
                    console.error("Firebase Initialization Error:", error);
                    setLoading(false);
                }
            }, []);

            // Firebase Auto-Save
            useEffect(() => {
                if (!loading && window.firebaseDbRef) {
                    if (isRemoteUpdate.current) {
                        isRemoteUpdate.current = false;
                    } else {
                        // Cleanse data of undefined values before saving
                        const cleanCharts = JSON.parse(JSON.stringify(charts)); 
                        window.firebaseDbRef.set(cleanCharts).catch(error => {
                            console.error("Firebase Save Error:", error);
                        });
                    }
                }
            }, [charts, loading]);

            // Save AI Keys
            const saveKeys = (engine, val) => {
                if (engine === 'gemini') {
                    setGeminiKey(val); localStorage.setItem('gemini_api_key', val);
                } else {
                    setOpenRouterKey(val); localStorage.setItem('openrouter_api_key', val);
                }
                showNotification(`${engine === 'gemini' ? 'Gemini' : 'OpenRouter'} Key Saved.`);
            };

            const toggleEngine = (val) => {
                setAiEngine(val);
                localStorage.setItem('ai_engine_pref', val);
            };

            // Dropdown Click Handler
            useEffect(() => {
                const handleClickOutside = (event) => {
                    if (exportMenuRef.current && !exportMenuRef.current.contains(event.target)) setShowExportMenu(false);
                };
                document.addEventListener("mousedown", handleClickOutside);
                return () => document.removeEventListener("mousedown", handleClickOutside);
            }, []);

            // --- Chart Tab Handlers ---
            const addNewChart = () => {
                const newChart = { id: generateId(), name: `New Chart ${charts.length + 1}`, tasks: [] };
                updateCharts([...charts, newChart]);
                setActiveTab(newChart.id);
                showNotification("New Chart Created");
            };

            const renameChart = (id, newName) => {
                if(!newName.trim()) return;
                const newCharts = charts.map(c => c.id === id ? { ...c, name: newName } : c);
                updateCharts(newCharts);
            };

            const deleteChart = (id) => {
                if (charts.length <= 1) return showNotification("You must have at least one chart.");
                if (window.confirm("Are you sure you want to delete this entire chart and all its tasks?")) {
                    const newCharts = charts.filter(c => c.id !== id);
                    updateCharts(newCharts);
                    if (activeTab === id) setActiveTab(newCharts[0].id);
                }
            };

            // --- Drag Logic ---
            useEffect(() => {
                if (!dragState) return;
                const handleMouseMove = (e) => {
                    if (!timelineGridRef.current) return;
                    const pixelsPerDay = timelineGridRef.current.offsetWidth / 365;
                    const shiftDays = Math.round((e.clientX - dragState.startX) / pixelsPerDay);
                    setDragState(prev => ({ ...prev, shiftDays }));
                };

                const handleMouseUp = () => {
                    if (dragState.shiftDays !== 0) {
                        let nStart = new Date(dragState.initialStart);
                        let nEnd = new Date(dragState.initialEnd);

                        if (dragState.mode === 'move') {
                            nStart.setDate(nStart.getDate() + dragState.shiftDays);
                            nEnd.setDate(nEnd.getDate() + dragState.shiftDays);
                            nStart = snapDate(nStart); nEnd = snapDate(nEnd);
                            if (nStart > nEnd) nEnd = new Date(nStart);
                        } else if (dragState.mode === 'resize-left') {
                            nStart.setDate(nStart.getDate() + dragState.shiftDays);
                            nStart = snapDate(nStart);
                            if (nStart > nEnd) nStart = new Date(nEnd); 
                        } else if (dragState.mode === 'resize-right') {
                            nEnd.setDate(nEnd.getDate() + dragState.shiftDays);
                            nEnd = snapDate(nEnd);
                            if (nEnd < nStart) nEnd = new Date(nStart); 
                        }

                        const formatLocal = (d) => `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;

                        const updatedTasks = tasks.map(t => t.id === dragState.id ? { ...t, startDate: formatLocal(nStart), endDate: formatLocal(nEnd) } : t);
                        updateActiveChartTasks(updatedTasks);
                        showNotification("Timeline updated.");
                    }
                    setDragState(null);
                };

                window.addEventListener('mousemove', handleMouseMove);
                window.addEventListener('mouseup', handleMouseUp);
                return () => { window.removeEventListener('mousemove', handleMouseMove); window.removeEventListener('mouseup', handleMouseUp); };
            }, [dragState, tasks, activeTab]);

            const handleDragStart = (e, task, mode = 'move') => {
                if (task.scheduleType === 'T + X Trigger') return;
                e.stopPropagation(); e.preventDefault(); 
                setDragState({ id: task.id, startX: e.clientX, initialStart: new Date(task.startDate), initialEnd: new Date(task.endDate), shiftDays: 0, mode });
            };

            const months = useMemo(() => Array.from({length: 12}, (_, i) => {
                const d = new Date(FY_START_YEAR, FY_START_MONTH + i, 1);
                return { label: d.toLocaleString('default', { month: 'short', year: '2-digit' }), fullDate: d };
            }), []);

            const quarters = useMemo(() => [{label: 'Q1 (Apr-Jun)'}, {label: 'Q2 (Jul-Sep)'}, {label: 'Q3 (Oct-Dec)'}, {label: 'Q4 (Jan-Mar)'}], []);

            // Handlers
            const handleSaveTask = () => {
                if (!newTask.title) return;
                const payload = { ...newTask };
                if (payload.dependency !== 'External') payload.department = ''; 

                const updatedTasks = editingId ? tasks.map(t => t.id === editingId ? { ...payload, id: editingId } : t) : [...tasks, { ...payload, id: generateId() }];
                updateActiveChartTasks(updatedTasks);
                closeModal();
                showNotification("Task saved!");
            };

            const confirmDelete = () => {
                if (!deleteConfirmId) return;
                updateActiveChartTasks(tasks.filter(t => t.id !== deleteConfirmId));
                setDeleteConfirmId(null);
                showNotification("Task deleted.");
            };

            // --- Dual AI Engine Fetch ---
            const fetchInsights = async (promptType) => {
                // Smart Fallback Logic
                let activeKey = aiEngine === 'gemini' ? geminiKey : openRouterKey;
                let actualEngine = aiEngine;
                
                if (!activeKey) {
                    if (aiEngine === 'gemini' && openRouterKey) { activeKey = openRouterKey; actualEngine = 'openrouter'; }
                    else if (aiEngine === 'openrouter' && geminiKey) { activeKey = geminiKey; actualEngine = 'gemini'; }
                    else return showNotification("Please enter an API key in the configuration area first.");
                }

                setIsAiLoading(true); setAiResponse('');
                
                try {
                    let finalPrompt = "";
                    let taskString = "";

                    // Global vs Local Logic
                    if (activeTab === 'global-ai') {
                        taskString = charts.map(chart => {
                            const cTasks = Array.isArray(chart.tasks) ? chart.tasks : (chart.tasks ? Object.values(chart.tasks) : []);
                            const tStr = cTasks.map((t, idx) => {
                                const isFixed = !t.scheduleType || t.scheduleType.includes('Absolute') || (t.startDate && t.endDate);
                                const sched = isFixed ? `${t.startDate} to ${t.endDate}` : `T+${t.triggerOffset} (Trigger: ${t.triggerEvent})`;
                                const dep = t.dependency === 'External' ? `External (${t.department})` : 'Internally Managed';
                                return `${idx + 1}. ${t.title} [Status: ${t.status}, Schedule: ${sched}, Dep: ${dep}]`;
                            }).join('\n');
                            return `### Portfolio Chart: ${chart.name}\n${tStr}`;
                        }).join('\n\n');

                            : (promptType === 'Deliverables' ? "Forecast the projected deliverables and key compliance milestones over the next 3-6 months based on the provided timeline."
                            : customPrompt)));

                        finalPrompt = `${specificPrompt}\n\nCRITICAL OUTPUT INSTRUCTIONS:\n1. Do NOT include introductory filler.\n2. USE markdown formatting extensively for readability. Use bolding (**text**) for emphasis.\n3. USE bullet points (-) and numbered lists.\n4. Output as a highly structured executive summary.\n\nWorkplan Data:\n${taskString}`;

                            method: 'POST', headers: { 'Content-Type': 'application/json' },

                        });

                const totalDuration = fyEnd - fyStart;
                let taskStart = new Date(task.startDate).getTime();
                let taskEnd = new Date(task.endDate).getTime();

                if (dragState && dragState.id === task.id) {
                    const shiftMs = dragState.shiftDays * 24 * 60 * 60 * 1000;
                    let tempStart = new Date(task.startDate); let tempEnd = new Date(task.endDate);
                    if (dragState.mode === 'move') { tempStart.setTime(tempStart.getTime() + shiftMs); tempEnd.setTime(tempEnd.getTime() + shiftMs); tempStart = snapDate(tempStart); tempEnd = snapDate(tempEnd); if (tempStart > tempEnd) tempEnd = new Date(tempStart); } 
                    else if (dragState.mode === 'resize-left') { tempStart.setTime(tempStart.getTime() + shiftMs); tempStart = snapDate(tempStart); if (tempStart > tempEnd) tempStart = new Date(tempEnd); } 
                    else if (dragState.mode === 'resize-right') { tempEnd.setTime(tempEnd.getTime() + shiftMs); tempEnd = snapDate(tempEnd); if (tempEnd < tempStart) tempEnd = new Date(tempStart); }
                    taskStart = tempStart.getTime(); taskEnd = tempEnd.getTime();
                }

                const effectiveStart = Math.max(taskStart, fyStart); const effectiveEnd = Math.min(taskEnd, fyEnd);

                const leftPercent = ((effectiveStart - fyStart) / totalDuration) * 100;
                const widthPercent = ((effectiveEnd - effectiveStart) / totalDuration) * 100;
                return { left: `${leftPercent}%`, width: `${Math.max(widthPercent, 0.5)}%` };

                                            <div className="pt-4 border-t">
                                                <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Custom Query</label>
                                                <textarea className="w-full border-2 border-slate-100 rounded-xl p-3 mt-2 text-sm h-24 focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none transition-all" placeholder="Ask specific questions about this chart..." value={customPrompt} onChange={e => setCustomPrompt(e.target.value)} />
                                                <button onClick={() => fetchInsights('Custom')} disabled={isAiLoading || !customPrompt} className="w-full bg-slate-900 text-white mt-3 py-2 rounded-xl font-bold text-sm hover:bg-black transition-all shadow-lg disabled:opacity-50">Query</button>
                                            </div>
                                        </div>
                                    </div>
                                    <div className="bg-white p-4 rounded-xl border border-slate-200 shadow-sm">
                                        <h3 className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-3">Engine Config</h3>
                                        <select value={aiEngine} onChange={(e) => toggleEngine(e.target.value)} className="w-full bg-slate-50 border border-slate-200 text-slate-700 text-xs font-bold rounded-lg p-2 mb-3 outline-none">
                                            <option value="gemini">Engine: Gemini</option>
                                            <option value="openrouter">Engine: OpenRouter</option>
                                        </select>
                                        <div className="space-y-2">
                                            <input type="password" value={geminiKey} onChange={e => setGeminiKey(e.target.value)} onBlur={() => saveKeys('gemini', geminiKey)} className="w-full border rounded-md p-1.5 text-[10px] font-mono outline-none" placeholder="Gemini Key..."/>
                                            <input type="password" value={openRouterKey} onChange={e => setOpenRouterKey(e.target.value)} onBlur={() => saveKeys('openrouter', openRouterKey)} className="w-full border rounded-md p-1.5 text-[10px] font-mono outline-none" placeholder="OpenRouter Key..."/>
                                        </div>
                                    </div>
                                </div>
                                <div className="flex-1 bg-white rounded-xl border border-slate-200 shadow-sm p-8 overflow-auto select-text relative">
                                    {isAiLoading ? (
                                        <div className="h-full flex flex-col items-center justify-center text-indigo-500">
                                            <IconRefreshCw className="animate-spin mb-4" size={48} />
                                            <span className="font-black text-xl animate-pulse tracking-tighter uppercase">Consulting AI...</span>
                                        </div>
                                    ) : aiResponse ? (
                                        <div className="prose prose-slate max-w-none [&>ul]:list-disc [&>ul]:pl-5 [&>ol]:list-decimal select-text">
                                            <MarkdownParser text={aiResponse} />
                                        </div>
                                    ) : (
                                        <div className="h-full flex flex-col items-center justify-center text-slate-300">
                                            <IconBrain size={64} className="mb-4 opacity-20" />
                                            <p className="font-bold text-lg opacity-40 uppercase tracking-tighter">Ready for Local Review</p>
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}
                    </div>

                    {/* MODAL: ADD/EDIT TASK */}
                    {isModalOpen && (
                        <div className="fixed inset-0 bg-black/60 backdrop-blur-md z-[100] flex items-center justify-center p-4">
                            <div className="bg-white rounded-2xl shadow-2xl w-full max-w-lg overflow-hidden border border-slate-300 animate-in zoom-in-95 duration-200">
                                <div className="p-6 border-b flex justify-between items-center bg-slate-50">
                                    <h2 className="font-black text-xl tracking-tight">{editingId ? 'Edit Workplan Item' : 'New Compliance Item'}</h2>
                                    <button onClick={closeModal} className="text-slate-400 hover:text-slate-900 transition-colors"><IconX /></button>
                                </div>
                                <div className="p-6 space-y-5">
                                    <div>
                                        <label className="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1.5">Task Name</label>
                                        <input className="w-full border-2 border-slate-100 p-3 rounded-xl font-bold text-slate-800 focus:border-blue-500 outline-none transition-all" value={newTask.title} onChange={e => setNewTask({...newTask, title: e.target.value})} placeholder="Enter task name..." />
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div>
                                            <label className="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1.5">Management Type</label>
                                            <select className="w-full border-2 border-slate-100 p-3 rounded-xl font-bold text-slate-700 outline-none" value={newTask.dependency} onChange={e => setNewTask({...newTask, dependency: e.target.value, department: ''})}>
                                                <option value="RISPL">Internally Managed</option>
                                                <option value="External">External Dependency</option>
                                            </select>
                                        </div>
                                        <div>
                                            <label className="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1.5">Classification</label>
                                            <select className="w-full border-2 border-slate-100 p-3 rounded-xl font-bold text-slate-700 outline-none" value={newTask.classification} onChange={e => setNewTask({...newTask, classification: e.target.value})}>
                                                {CLASSIFICATIONS.map(c => <option key={c} value={c}>{c}</option>)}
                                            </select>
                                        </div>
                                    </div>
                                    {newTask.dependency === 'External' && (
                                        <div className="animate-in slide-in-from-top-2">
                                            <label className="block text-[10px] font-black text-red-500 uppercase tracking-widest mb-1.5">External Department / Group</label>
                                            <select className="w-full border-2 border-red-100 p-3 rounded-xl font-bold text-red-700 bg-red-50 outline-none" value={newTask.department} onChange={e => setNewTask({...newTask, department: e.target.value})}>
                                                <option value="">Select Responsible Dept</option>
                                                {DEPARTMENTS.map(d => <option key={d} value={d}>{d}</option>)}
                                            </select>
                                        </div>
                                    )}
                                    <div className="border border-slate-200 rounded-xl overflow-hidden mt-4">
                                        <div className="bg-slate-50 p-3 border-b border-slate-200 flex justify-between items-center">
                                            <label className="text-[10px] font-black text-slate-500 uppercase tracking-widest">Schedule Type</label>
                                            <select className="text-xs font-bold bg-white border border-slate-200 rounded p-1" value={newTask.scheduleType} onChange={e => setNewTask({...newTask, scheduleType: e.target.value})}>
                                                {SCHEDULE_TYPES.map(t => <option key={t} value={t}>{t}</option>)}
                                            </select>
                                        </div>
                                        <div className="p-4 grid grid-cols-2 gap-4">
                                            {newTask.scheduleType === 'T + X Trigger' ? (
                                                <>
                                                    <div>
                                                        <label className="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1.5">Trigger Event (T)</label>
                                                        {isCustomTrigger ? (
                                                            <input type="text" className="w-full border-2 border-slate-100 rounded-lg p-2 font-bold text-sm" placeholder="Custom trigger..." value={newTask.triggerEvent} onChange={e => setNewTask({...newTask, triggerEvent: e.target.value})} />
                                                        ) : (
                                                            <select className="w-full border-2 border-slate-100 rounded-lg p-2 font-bold text-sm" value={TRIGGER_EVENTS.includes(newTask.triggerEvent) ? newTask.triggerEvent : 'custom'} onChange={e => { if (e.target.value === 'custom') { setIsCustomTrigger(true); setNewTask({...newTask, triggerEvent: ''}); } else setNewTask({...newTask, triggerEvent: e.target.value}); }}>
                                                                {TRIGGER_EVENTS.map(t => <option key={t} value={t}>{t}</option>)}
                                                                <option value="custom">+ Custom...</option>
                                                            </select>
                                                        )}
                                                    </div>
                                                    <div>
                                                        <label className="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1.5">Days After Trigger (+X)</label>
                                                        <input type="number" min="0" className="w-full border-2 border-slate-100 rounded-lg p-2 font-bold text-sm" value={newTask.triggerOffset} onChange={e => setNewTask({...newTask, triggerOffset: parseInt(e.target.value) || 0})} />
                                                    </div>
                                                </>
                                            ) : (
                                                <>
                                                    <div>
                                                        <label className="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1.5">Start Date</label>
                                                        <input type="date" className="w-full border-2 border-slate-100 p-2 rounded-lg font-bold text-sm" value={newTask.startDate} onChange={e => setNewTask({...newTask, startDate: e.target.value})} />
                                                    </div>
                                                    <div>
                                                        <label className="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1.5">End Date</label>
                                                        <input type="date" className="w-full border-2 border-slate-100 p-2 rounded-lg font-bold text-sm" value={newTask.endDate} onChange={e => setNewTask({...newTask, endDate: e.target.value})} />
                                                    </div>
                                                </>
                                            )}
                                        </div>
                                    </div>
                                    <div>
                                        <label className="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1.5">Initial Status</label>
                                        <select className="w-full border-2 border-slate-100 p-3 rounded-xl font-bold text-slate-700 outline-none" value={newTask.status} onChange={e => setNewTask({...newTask, status: e.target.value})}>
                                            {STATUSES.map(s => <option key={s} value={s}>{s}</option>)}
                                        </select>
                                    </div>
                                </div>
                                <div className="p-6 border-t bg-slate-50 flex justify-between gap-3">
                                    {editingId && (
                                        <button onClick={() => { setDeleteConfirmId(editingId); setIsModalOpen(false); }} className="text-red-600 font-bold hover:bg-red-50 px-4 py-2 rounded-xl transition-colors">Delete Item</button>
                                    )}
                                    <div className="flex gap-2 ml-auto">
                                        <button onClick={closeModal} className="px-5 py-2 font-bold text-slate-400 hover:text-slate-600 transition-colors">Cancel</button>
                                        <button onClick={handleSaveTask} disabled={!newTask.title || isDateInvalid} className="bg-blue-600 text-white px-8 py-3 rounded-xl font-black shadow-lg hover:bg-blue-700 active:scale-95 transition-all uppercase tracking-tighter disabled:opacity-50">Save Changes</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* CONFIRM DELETE MODAL */}
                    {deleteConfirmId && (
                        <div className="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-[120] p-4">
                            <div className="bg-white rounded-2xl shadow-xl w-full max-w-sm p-6 text-center animate-in zoom-in-95 duration-200 border border-slate-200">
                                <IconAlertCircle className="w-12 h-12 text-red-500 mx-auto mb-4" />
                                <h3 className="text-lg font-black text-slate-800 mb-2">Delete Task?</h3>
                                <p className="text-sm font-medium text-slate-500 mb-6">Are you sure you want to delete this task? This action cannot be undone.</p>
                                <div className="flex justify-center gap-3">
                                    <button onClick={() => { setDeleteConfirmId(null); setIsModalOpen(true); }} className="px-5 py-2.5 text-slate-600 hover:bg-slate-100 rounded-xl font-bold transition-colors">Cancel</button>
                                    <button onClick={confirmDelete} className="px-5 py-2.5 bg-red-600 hover:bg-red-700 text-white rounded-xl font-black shadow-sm transition-colors">Delete Permanently</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* NOTIFICATIONS */}
                    {notification && (
                        <div className="fixed bottom-8 right-8 bg-slate-900 text-white px-6 py-4 rounded-2xl shadow-2xl z-[200] flex items-center gap-3 animate-in slide-in-from-bottom-6 duration-300 border border-white/10">
                            <div className="w-2 h-2 rounded-full bg-green-400 animate-pulse"></div>
                            <span className="text-sm font-bold tracking-tight">{notification}</span>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ComplianceGantt />);
    </script>
</body>
</html>
