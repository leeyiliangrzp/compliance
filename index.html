        const IconExternalLink = (p) => <SVGIcon {...p}><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" x2="21" y1="14" y2="3"/></SVGIcon>;
        const IconShield = (p) => <SVGIcon {...p}><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10"/></SVGIcon>;
        const IconHelpCircle = (p) => <SVGIcon {...p}><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><path d="M12 17h.01"/></SVGIcon>;


        // --- 2. Constants ---
        const CLASSIFICATIONS = [
          'Governance & Oversight', 'Risk Assessment & Framework', 'Systems & Technology',
          'Operational Processes', 'Team Training', 'Regulatory Readiness'
        ];
        const STATUSES = ['Not Started', 'In Progress', 'Completed'];
        const DEPENDENCIES = ['RISPL', 'External'];
        const DEPARTMENTS = ['Finance', 'Product', 'Legal', 'Risk', 'Operations', 'IT'];
        const SCHEDULE_TYPES = ['Absolute Date', 'T + X Trigger'];
        const TRIGGER_EVENTS = ['IPA', 'Final License Grant', 'Go-Live'];

        const CLASSIFICATION_COLORS = {
          'Governance & Oversight': 'bg-purple-500', 'Risk Assessment & Framework': 'bg-red-500',
          'Systems & Technology': 'bg-blue-500', 'Operational Processes': 'bg-emerald-500',
          'Team Training': 'bg-yellow-500', 'Regulatory Readiness': 'bg-orange-500'
        };

        const STATUS_COLORS = {
          'Not Started': 'bg-gray-200 text-gray-700 border-gray-300',
          'In Progress': 'bg-blue-100 text-blue-800 border-blue-300',
          'Completed': 'bg-green-100 text-green-800 border-green-300'
        };

        const FY_START_YEAR = 2026;
        const FY_START_MONTH = 3; 

        const generateId = () => typeof crypto !== 'undefined' && crypto.randomUUID ? crypto.randomUUID() : Date.now().toString(36) + Math.random().toString(36).substring(2);

        const snapDate = (dateObj) => {
          const d = new Date(dateObj);
          const day = d.getDate();
          const lastDay = new Date(d.getFullYear(), d.getMonth() + 1, 0).getDate();
          
          const dist1 = day - 1;
          const dist15 = Math.abs(day - 15);
          const distLast = lastDay - day;
          
          const min = Math.min(dist1, dist15, distLast);
          if (min === dist1) d.setDate(1);
          else if (min === dist15) d.setDate(15);
          else d.setDate(lastDay);
          return d;
        };

        // --- Robust Markdown Parser Component ---
        const MarkdownParser = ({ text }) => {
            const html = window.marked ? window.marked.parse(text) : text;
            return <div dangerouslySetInnerHTML={{ __html: html }} className="prose prose-slate prose-sm max-w-none text-slate-700 w-full" />;
        };

        // --- 3. Main Application Component ---
        function ComplianceGantt() {
          const [tasks, setTasks] = useState([]);
          const [view, setView] = useState('timeline');
          const [isModalOpen, setIsModalOpen] = useState(false);
          const [editingId, setEditingId] = useState(null);
          const [loading, setLoading] = useState(true);
          
          const fileInputRef = useRef(null);
          const timelineGridRef = useRef(null);
          const exportMenuRef = useRef(null);
          
          const [deleteConfirmId, setDeleteConfirmId] = useState(null);
          const [notification, setNotification] = useState('');
          const [showFilters, setShowFilters] = useState(false);
          const [isFullscreen, setIsFullscreen] = useState(false);
          const [isCustomTrigger, setIsCustomTrigger] = useState(false);
          const [isPdfMode, setIsPdfMode] = useState(false);
          const [showExportMenu, setShowExportMenu] = useState(false);
          const containerRef = useRef(null);
          
          const [dragState, setDragState] = useState(null); 

          const [activeFilters, setActiveFilters] = useState({
            classification: 'All', status: 'All', dependency: 'All', department: 'All'
          });
          const [sortBy, setSortBy] = useState('default'); 
          const [timelineScale, setTimelineScale] = useState('months');

          const [apiKey, setApiKey] = useState('');
          const [aiResponse, setAiResponse] = useState('');
          const [isAiLoading, setIsAiLoading] = useState(false);
          const [customPrompt, setCustomPrompt] = useState('');

          const [newTask, setNewTask] = useState({
            title: '', description: '', classification: CLASSIFICATIONS[0], status: STATUSES[0],
            dependency: DEPENDENCIES[0], department: '', scheduleType: 'Absolute Date', triggerEvent: TRIGGER_EVENTS[0],
            triggerOffset: 30, startDate: '2026-04-01', endDate: '2026-04-30'
          });

          // FIREBASE SYNC REF
          const isRemoteUpdate = useRef(false);

          // Setup effect hooks
          useEffect(() => {
            // FIREBASE CLOUD SYNC INITIALIZATION (COMPAT MODE)
            try {
                const firebaseConfig = {
                    apiKey: "AIzaSyDBUGby8pv_YzFrED7kQm1nMydxwbzArew",
                    authDomain: "compliance-json-storage.firebaseapp.com",
                    databaseURL: "https://compliance-json-storage-default-rtdb.asia-southeast1.firebasedatabase.app",
                    projectId: "compliance-json-storage",
                    storageBucket: "compliance-json-storage.firebasestorage.app",
                    messagingSenderId: "94949340652",
                    appId: "1:94949340652:web:f49aa96d667480e7433cc9"
                };

                if (!window.firebase.apps.length) {
                    window.firebase.initializeApp(firebaseConfig);
                }

                const db = window.firebase.database();
                const tasksRef = db.ref('sharedData/tasks');

                window.firebaseDbRef = tasksRef;

                tasksRef.on('value', (snapshot) => {
                    const data = snapshot.val();
                    isRemoteUpdate.current = true; 
                    if (data) {
                        setTasks(data);
                    } else {
                        setTasks([]); 
                    }
                    setLoading(false);
                });
            } catch (error) {
                console.error("Firebase Initialization Error:", error);
                setLoading(false);
            }

            const savedKey = localStorage.getItem('gemini_api_key');
            if (savedKey) setApiKey(savedKey);
          }, []);

          // FIREBASE SAVE EFFECT
          useEffect(() => {
            if (!loading) {
                if (isRemoteUpdate.current) {
                    isRemoteUpdate.current = false;
                } else {
                    if (window.firebaseDbRef) {
                        const cleanTasks = JSON.parse(JSON.stringify(tasks)); 
                        window.firebaseDbRef.set(cleanTasks).catch(error => {
                            console.error("Firebase Save Error:", error);
                            showNotification("Error: Could not save to cloud.");
                        });
                    }
                }
            }
          }, [tasks, loading]);

          useEffect(() => {
            const handleClickOutside = (event) => {
              if (exportMenuRef.current && !exportMenuRef.current.contains(event.target)) {
                setShowExportMenu(false);
              }
            };
            document.addEventListener("mousedown", handleClickOutside);
            return () => document.removeEventListener("mousedown", handleClickOutside);
          }, []);

          useEffect(() => {
            const handleFsChange = () => {
              const isNative = !!(document.fullscreenElement || document.webkitFullscreenElement || document.msFullscreenElement);
              if (!isNative && isFullscreen) setIsFullscreen(false);
              else if (isNative && !isFullscreen) setIsFullscreen(true);
            };
            document.addEventListener('fullscreenchange', handleFsChange);
            return () => document.removeEventListener('fullscreenchange', handleFsChange);
          }, [isFullscreen]);

          const saveApiKey = (key) => {
              setApiKey(key);
              localStorage.setItem('gemini_api_key', key);
              showNotification("API Key saved securely to browser storage.");
          };

          // Drag logic
          useEffect(() => {
            if (!dragState) return;

            const handleMouseMove = (e) => {
              if (!timelineGridRef.current) return;
              const diffX = e.clientX - dragState.startX;
              const timelineWidth = timelineGridRef.current.offsetWidth;
              const totalDaysInTimeline = 365; 
              const pixelsPerDay = timelineWidth / totalDaysInTimeline;
              const shiftDays = Math.round(diffX / pixelsPerDay);
              setDragState(prev => ({ ...prev, shiftDays }));
            };

            const handleMouseUp = () => {
              if (dragState.shiftDays !== 0) {
                let nStart = new Date(dragState.initialStart);
                let nEnd = new Date(dragState.initialEnd);

                if (dragState.mode === 'move') {
                  nStart.setDate(nStart.getDate() + dragState.shiftDays);
                  nEnd.setDate(nEnd.getDate() + dragState.shiftDays);
                  nStart = snapDate(nStart);
                  nEnd = snapDate(nEnd);
                  if (nStart > nEnd) nEnd = new Date(nStart);
                } else if (dragState.mode === 'resize-left') {
                  nStart.setDate(nStart.getDate() + dragState.shiftDays);
                  nStart = snapDate(nStart);
                  if (nStart > nEnd) nStart = new Date(nEnd); 
                } else if (dragState.mode === 'resize-right') {
                  nEnd.setDate(nEnd.getDate() + dragState.shiftDays);
                  nEnd = snapDate(nEnd);
                  if (nEnd < nStart) nEnd = new Date(nStart); 
                }

                const formatLocal = (d) => {
                    const year = d.getFullYear();
                    const month = String(d.getMonth() + 1).padStart(2, '0');
                    const day = String(d.getDate()).padStart(2, '0');
                    return `${year}-${month}-${day}`;
                };

                setTasks(prevTasks => prevTasks.map(t => {
                    if (t.id === dragState.id) {
                        return { ...t, startDate: formatLocal(nStart), endDate: formatLocal(nEnd) };
                    }
                    return t;
                }));
                showNotification("Timeline snapped & updated to Cloud.");
              }
              setDragState(null);
            };

            window.addEventListener('mousemove', handleMouseMove);
            window.addEventListener('mouseup', handleMouseUp);
            return () => {
              window.removeEventListener('mousemove', handleMouseMove);
              window.removeEventListener('mouseup', handleMouseUp);
            };
          }, [dragState]);

          const handleDragStart = (e, task, mode = 'move') => {
            if (task.scheduleType === 'T + X Trigger') return;
            e.stopPropagation();
            e.preventDefault(); 
            setDragState({ id: task.id, startX: e.clientX, initialStart: new Date(task.startDate), initialEnd: new Date(task.endDate), shiftDays: 0, mode });
          };

          // Filtering & Sorting
          const processedTasks = useMemo(() => {
            let result = [...tasks];

            if (activeFilters.classification !== 'All') result = result.filter(t => t.classification === activeFilters.classification);
            if (activeFilters.status !== 'All') result = result.filter(t => t.status === activeFilters.status);
            if (activeFilters.dependency !== 'All') result = result.filter(t => (t.dependency === 'External' ? 'External' : 'RISPL') === activeFilters.dependency);
            if (activeFilters.dependency === 'External' && activeFilters.department !== 'All') {
                result = result.filter(t => t.department === activeFilters.department);
            }

            result.sort((a, b) => {
                if (sortBy === 'default') {
                    const classA = CLASSIFICATIONS.indexOf(a.classification);
                    const classB = CLASSIFICATIONS.indexOf(b.classification);
                    const classDiff = (classA === -1 ? 99 : classA) - (classB === -1 ? 99 : classB);
                    if (classDiff !== 0) return classDiff;

                    const startA = new Date(a.startDate || 0).getTime() || 0;
                    const startB = new Date(b.startDate || 0).getTime() || 0;
                    if (startA !== startB) return startA - startB;

                    const endA = new Date(a.endDate || 0).getTime() || 0;
                    const endB = new Date(b.endDate || 0).getTime() || 0;
                    if (endA !== endB) return endA - endB;

                    const depA = a.dependency === 'External' ? 1 : 0;
                    const depB = b.dependency === 'External' ? 1 : 0;
                    return depA - depB;
                }
                if (sortBy === 'startDate') return new Date(a.startDate || 0) - new Date(b.startDate || 0);
                if (sortBy === 'title') return (a.title || '').localeCompare(b.title || '');
                if (sortBy === 'status') return (a.status || '').localeCompare(b.status || '');
                if (sortBy === 'classification') {
                     const weightA = CLASSIFICATIONS.indexOf(a.classification);
                     const weightB = CLASSIFICATIONS.indexOf(b.classification);
                     return (weightA === -1 ? 99 : weightA) - (weightB === -1 ? 99 : weightB);
                }
                return 0;
            });

            return result;
          }, [tasks, activeFilters, sortBy]);

          const absoluteTasks = processedTasks.filter(t => (t.scheduleType || 'Absolute Date') === 'Absolute Date');
          const triggerTasks = processedTasks.filter(t => t.scheduleType === 'T + X Trigger');

          // Risk Engine
          const { overdueTasks, highRiskTasks, chartData } = useMemo(() => {
             const now = new Date();
             now.setHours(0,0,0,0);
             const nowMs = now.getTime();
             const plus14Ms = nowMs + (14 * 24 * 60 * 60 * 1000);

             const overdue = [];
             const highRisk = [];

             tasks.forEach(t => {
                 if(t.status === 'Completed' || t.scheduleType !== 'Absolute Date') return;
                 const start = new Date(t.startDate).getTime();
                 const end = new Date(t.endDate).getTime();

                 if (end < nowMs || (start < nowMs && t.status === 'Not Started')) {
                     overdue.push(t);
                 } else if ((t.status === 'Not Started' && start <= plus14Ms) || (t.status === 'In Progress' && end <= plus14Ms)) {
                     highRisk.push(t);
                 }
             });

             const cNotStarted = tasks.filter(t => t.status === 'Not Started').length;
             const cInProgress = tasks.filter(t => t.status === 'In Progress').length;
             const cCompleted = tasks.filter(t => t.status === 'Completed').length;
             const total = tasks.length || 1;

             return {
                 overdueTasks: overdue,
                 highRiskTasks: highRisk,
                 chartData: {
                     notStarted: Math.round((cNotStarted/total)*100),
                     inProgress: Math.round((cInProgress/total)*100),
                     completed: Math.round((cCompleted/total)*100),
                     total: tasks.length
                 }
             };
          }, [tasks]);

          const months = useMemo(() => Array.from({length: 12}, (_, i) => {
              const d = new Date(FY_START_YEAR, FY_START_MONTH + i, 1);
              return { label: d.toLocaleString('default', { month: 'short', year: '2-digit' }), fullDate: d };
          }), []);

          const quarters = useMemo(() => [{label: 'Q1 (Apr-Jun)'}, {label: 'Q2 (Jul-Sep)'}, {label: 'Q3 (Oct-Dec)'}, {label: 'Q4 (Jan-Mar)'}], []);

          // Handlers
          const handleSaveTask = () => {
            if (!newTask.title) return;
            const payload = { ...newTask };
            if (payload.dependency !== 'External') payload.department = ''; 

            if (editingId) setTasks(tasks.map(t => t.id === editingId ? { ...payload, id: editingId } : t));
            else setTasks([...tasks, { ...payload, id: generateId() }]);
            
            closeModal();
            showNotification("Task synced to cloud!");
          };

          const confirmDelete = () => {
            if (!deleteConfirmId) return;
            setTasks(tasks.filter(t => t.id !== deleteConfirmId));
            setDeleteConfirmId(null);
            showNotification("Task deleted from cloud.");
          };

          const showNotification = (msg) => {
            setNotification(msg);
            setTimeout(() => setNotification(''), 3000);
          };

          // AI Fetch

                                       <li>Copy the generated key and paste it above.</li>
                                   </ol>
                               </div>
                               <div>
                                    <h3 className="text-sm font-bold text-slate-800 mb-2 flex items-center gap-2"><IconShield size={16} className="text-green-500"/> Security & Privacy</h3>
                                    <p className="text-xs text-slate-600 leading-relaxed">Your API key and workplan data are <strong>never stored on external servers</strong>. The key is saved entirely offline in your browser's <code>localStorage</code>, and queries are sent directly from your browser to Google's API endpoints.</p>
                               </div>
                           </div>
                       </div>
                   ) : (
                       <div className="max-w-4xl w-full flex flex-col h-full">
                           <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 mb-6 shrink-0">
                               <div className="flex items-center justify-between mb-4">
                                   <div className="flex items-center gap-3">
                                        <div className="w-10 h-10 bg-indigo-100 text-indigo-600 rounded-lg flex items-center justify-center">
                                            <IconSparkles size={24} />
                                        </div>
                                        <div>
                                            <h2 className="text-lg font-bold text-slate-800">Ask the Consultant</h2>
                                            <p className="text-xs text-slate-500">Run strategic analysis on your current compliance data.</p>
                                        </div>
                                   </div>
                                   <button onClick={() => { setApiKey(''); localStorage.removeItem('gemini_api_key'); setAiResponse(''); }} className="text-xs text-slate-400 hover:text-slate-600 underline">Change Key</button>
                               </div>
                               
                               <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                   <button onClick={() => fetchInsights('Holistic')} disabled={isAiLoading} className="flex flex-col items-start p-4 border border-slate-200 rounded-lg hover:border-indigo-300 hover:bg-indigo-50 transition-all text-left disabled:opacity-50 group">
                                       <span className="font-bold text-indigo-700 mb-1 group-hover:text-indigo-800">Holistic Review</span>
                                       <span className="text-xs text-slate-500">Analyze the overall workplan for major gaps, risks, and strategic improvements.</span>
                                   </button>
                                   <button onClick={() => fetchInsights('Bottlenecks')} disabled={isAiLoading} className="flex flex-col items-start p-4 border border-slate-200 rounded-lg hover:border-orange-300 hover:bg-orange-50 transition-all text-left disabled:opacity-50 group">
                                       <span className="font-bold text-orange-700 mb-1 group-hover:text-orange-800">Bottleneck Analysis</span>
                                       <span className="text-xs text-slate-500">Identify friction points based on dependencies, external parties, and schedules.</span>
                                   </button>
                                   <button onClick={() => fetchInsights('Actions')} disabled={isAiLoading} className="flex flex-col items-start p-4 border border-slate-200 rounded-lg hover:border-emerald-300 hover:bg-emerald-50 transition-all text-left disabled:opacity-50 group">
                                       <span className="font-bold text-emerald-700 mb-1 group-hover:text-emerald-800">Suggested Actions</span>
                                       <span className="text-xs text-slate-500">Get a prioritized list of immediate next steps to ensure regulatory compliance.</span>
                                   </button>
                                   <button onClick={() => fetchInsights('Deliverables')} disabled={isAiLoading} className="flex flex-col items-start p-4 border border-slate-200 rounded-lg hover:border-blue-300 hover:bg-blue-50 transition-all text-left disabled:opacity-50 group">
                                       <span className="font-bold text-blue-700 mb-1 group-hover:text-blue-800">Projected Deliverables</span>
                                       <span className="text-xs text-slate-500">Forecast key compliance milestones and expected outputs over the next 3-6 months.</span>
                                   </button>
                               </div>
                               
                               {/* Custom Prompt Area */}
                               <div className="mt-4 pt-4 border-t border-slate-100">
                                   <label className="block text-sm font-bold text-slate-700 mb-2">Or ask your own question:</label>
                                   <textarea 
                                        className="w-full border border-slate-300 rounded-lg p-3 focus:ring-2 focus:ring-indigo-500 outline-none text-sm resize-none h-20 shadow-inner"
                                        placeholder="e.g., Which department is handling the most dependencies right now?"
                                        value={customPrompt}
                                        onChange={(e) => setCustomPrompt(e.target.value)}
                                   />
                                   <div className="flex justify-end mt-2">
                                       <button 
                                           onClick={() => fetchInsights('Custom')} 
                                           disabled={isAiLoading || !customPrompt.trim()}
                                           className="bg-indigo-600 hover:bg-indigo-700 text-white px-5 py-2 rounded-lg text-sm font-medium transition-colors disabled:opacity-50 shadow-sm"
                                       >
                                           Send Custom Prompt
                                       </button>
                                   </div>
                               </div>

                           </div>

                           <div className="flex-1 bg-white p-8 rounded-xl shadow-sm border border-slate-200 overflow-auto relative min-h-[300px] select-text">
                               {isAiLoading ? (
                                   <div className="absolute inset-0 flex flex-col items-center justify-center text-indigo-600 bg-white/80 backdrop-blur-sm z-10 rounded-xl">
                                        <IconRefreshCw size={32} className="animate-spin mb-3" />
                                        <p className="font-bold animate-pulse">Consultant is analyzing data...</p>
                                   </div>
                               ) : aiResponse ? (
                                   <div className="prose prose-slate max-w-none [&>ul]:list-disc [&>ul]:pl-5 [&>ol]:list-decimal [&>ol]:pl-5 select-text">
                                       <MarkdownParser text={aiResponse} />
                                   </div>
                               ) : (
                                   <div className="h-full flex flex-col items-center justify-center text-slate-400 opacity-50">
                                       <IconBrain size={48} className="mb-4" />
                                       <p>Select a preset or ask a custom question above.</p>
                                   </div>
                               )}
                           </div>
                       </div>
                   )}
               </div>
            )}
          </>
        )}
      </div>

      {/* Modals and Overlays */}
      {isModalOpen && (
        <div className="fixed inset-0 bg-black/40 backdrop-blur-sm flex items-center justify-center z-[110] p-4">
          <div className="bg-white rounded-xl shadow-xl w-full max-w-xl border border-slate-200 max-h-[90vh] flex flex-col">
            <div className="p-6 border-b border-slate-100 flex justify-between items-center shrink-0">
              <div>
                <h2 className="text-xl font-bold text-slate-800">{editingId ? 'Edit Action Item' : 'Add Compliance Action Item'}</h2>
                <p className="text-sm text-slate-500 mt-1">FY 26/27 Planning</p>
              </div>
              <button onClick={closeModal} className="text-slate-400 hover:text-slate-600 p-1"><IconX size={20} /></button>
            </div>
            
            <div className="p-6 space-y-5 overflow-y-auto flex-1">
              <div>
                <label className="block text-sm font-medium text-slate-700 mb-1">Action Item / Task Name</label>
                <input type="text" className="w-full border border-slate-300 rounded-lg p-2.5 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="e.g. Establish Safeguarding Trust Account" value={newTask.title} onChange={e => setNewTask({...newTask, title: e.target.value})} autoFocus />
              </div>

              <div>
                <label className="block text-sm font-medium text-slate-700 mb-1">Description / Notes</label>
                <textarea className="w-full border border-slate-300 rounded-lg p-2.5 focus:ring-2 focus:ring-blue-500 outline-none resize-none h-20" placeholder="Add details about this action item..." value={newTask.description} onChange={e => setNewTask({...newTask, description: e.target.value})} />
              </div>

              <div className="grid grid-cols-1 md:grid-cols-2 gap-4 bg-slate-50 p-4 rounded-lg border border-slate-100">
                <div>
                  <label className="block text-sm font-medium text-slate-700 mb-1">Classification</label>
                  <select className="w-full border border-slate-300 rounded-lg p-2 focus:ring-2 focus:ring-blue-500 outline-none bg-white" value={newTask.classification} onChange={e => setNewTask({...newTask, classification: e.target.value})}>
                    {CLASSIFICATIONS.map(c => <option key={c} value={c}>{c}</option>)}
                  </select>
                </div>
                <div>
                  <label className="block text-sm font-medium text-slate-700 mb-1">Dependency</label>
                  <select className="w-full border border-slate-300 rounded-lg p-2 focus:ring-2 focus:ring-blue-500 outline-none bg-white" value={newTask.dependency} onChange={e => setNewTask({...newTask, dependency: e.target.value, department: ''})}>
                    {DEPENDENCIES.map(d => <option key={d} value={d}>{d}</option>)}
                  </select>
                </div>
                {newTask.dependency === 'External' && (
                  <div className="md:col-span-2 animate-in fade-in duration-200">
                    <label className="block text-sm font-medium text-slate-700 mb-1">Department</label>
                    <select className="w-full border border-blue-300 rounded-lg p-2 focus:ring-2 focus:ring-blue-500 outline-none bg-blue-50" value={newTask.department} onChange={e => setNewTask({...newTask, department: e.target.value})}>
                      <option value="" disabled>Select Dept...</option>
                      {DEPARTMENTS.map(d => <option key={d} value={d}>{d}</option>)}
                    </select>
                  </div>
                )}
              </div>

              <div className="border border-indigo-100 rounded-lg overflow-hidden">
                <div className="bg-indigo-50 p-3 border-b border-indigo-100 flex items-center justify-between">
                   <label className="text-sm font-semibold text-indigo-900">Schedule Type</label>
                   <select className="border border-indigo-200 text-indigo-800 text-sm rounded-md p-1 outline-none bg-white font-medium" value={newTask.scheduleType} onChange={e => setNewTask({...newTask, scheduleType: e.target.value})}>
                      {SCHEDULE_TYPES.map(t => <option key={t} value={t}>{t}</option>)}
                   </select>
                </div>
                
                <div className="p-4 bg-white grid grid-cols-2 gap-4">
                   {newTask.scheduleType === 'T + X Trigger' ? (
                      <>
                        <div>
                          <div className="flex justify-between items-center mb-1">
                            <label className="block text-sm font-medium text-slate-700">Trigger Event (T)</label>
                            {isCustomTrigger && (
                              <button type="button" onClick={() => { setIsCustomTrigger(false); setNewTask({...newTask, triggerEvent: TRIGGER_EVENTS[0]}); }} className="text-[10px] text-indigo-600 hover:underline">Use Preset</button>
                            )}
                          </div>
                          {isCustomTrigger ? (
                            <input type="text" className="w-full border border-slate-300 rounded-lg p-2 focus:ring-2 focus:ring-indigo-500 outline-none bg-white" placeholder="Enter custom trigger..." value={newTask.triggerEvent} onChange={e => setNewTask({...newTask, triggerEvent: e.target.value})} />
                          ) : (
                            <select className="w-full border border-slate-300 rounded-lg p-2 focus:ring-2 focus:ring-indigo-500 outline-none bg-white" value={TRIGGER_EVENTS.includes(newTask.triggerEvent) ? newTask.triggerEvent : 'custom'} onChange={e => {
                              if (e.target.value === 'custom') {
                                setIsCustomTrigger(true);
                                setNewTask({...newTask, triggerEvent: ''});
                              } else {
                                setNewTask({...newTask, triggerEvent: e.target.value});
                              }
                            }}>
                              {TRIGGER_EVENTS.map(t => <option key={t} value={t}>{t}</option>)}
                              <option value="custom">+ Custom Trigger...</option>
                            </select>
                          )}
                        </div>
                        <div>
                          <label className="block text-sm font-medium text-slate-700 mb-1">Days After Trigger (+X)</label>
                          <div className="flex items-center gap-2">
                             <span className="font-bold text-slate-400">T +</span>
                             <input type="number" min="0" className="w-full border border-slate-300 rounded-lg p-2 focus:ring-2 focus:ring-indigo-500 outline-none" value={newTask.triggerOffset} onChange={e => setNewTask({...newTask, triggerOffset: parseInt(e.target.value) || 0})} />
                          </div>
                        </div>

                        <div className="mt-4 pt-4 border-t border-indigo-100 col-span-2">
                          <label className="block text-sm font-bold text-indigo-900 mb-2">Did the Trigger Event occur?</label>
                          <div className="flex items-center gap-3">
                             <input type="date" 
                                className="border border-indigo-200 rounded-lg p-2 focus:ring-2 focus:ring-indigo-500 outline-none text-sm text-indigo-800"
                                onChange={(e) => {
                                    if(e.target.value) {
                                        const start = new Date(e.target.value);
                                        const end = new Date(start);
                                        end.setDate(end.getDate() + newTask.triggerOffset);
                                        
                                        const formatLocal = (d) => {
                                            const year = d.getFullYear();
                                            const month = String(d.getMonth() + 1).padStart(2, '0');
                                            const day = String(d.getDate()).padStart(2, '0');
                                            return `${year}-${month}-${day}`;
                                        };

                                        setNewTask({
                                            ...newTask,
                                            scheduleType: 'Absolute Date',
                                            startDate: formatLocal(start),
                                            endDate: formatLocal(end)
                                        });
                                        showNotification("Trigger executed! Task moved to main timeline.");
                                    }
                                }}
                             />
                             <span className="text-xs text-indigo-600 italic">Enter the actual date to automatically move this task to the main timeline.</span>
                          </div>
                        </div>
                      </>
                   ) : (
                      <>
                        <div>
                          <label className="block text-sm font-medium text-slate-700 mb-1">Start Date</label>
                          <input type="date" className="w-full border border-slate-300 rounded-lg p-2 focus:ring-2 focus:ring-blue-500 outline-none" value={newTask.startDate} onChange={e => setNewTask({...newTask, startDate: e.target.value})} />
                        </div>
                        <div>
                          <label className="block text-sm font-medium text-slate-700 mb-1">End Date</label>
                          <input type="date" className="w-full border border-slate-300 rounded-lg p-2 focus:ring-2 focus:ring-blue-500 outline-none" value={newTask.endDate} onChange={e => setNewTask({...newTask, endDate: e.target.value})} />
                        </div>
                        {isDateInvalid && (
                          <div className="col-span-2 text-xs text-red-500 font-medium flex items-center gap-1 mt-1">
                            <IconAlertCircle size={14} /> Start Date is post-dated after the End Date specified.
                          </div>
                        )}
                      </>
                   )}
                </div>
              </div>

               <div>
                <label className="block text-sm font-medium text-slate-700 mb-1">Initial Status</label>
                <select className="w-full border border-slate-300 rounded-lg p-2.5 focus:ring-2 focus:ring-blue-500 outline-none bg-white" value={newTask.status} onChange={e => setNewTask({...newTask, status: e.target.value})}>
                  {STATUSES.map(s => <option key={s} value={s}>{s}</option>)}
                </select>
               </div>
            </div>
            
            <div className="p-6 border-t border-slate-100 flex justify-end gap-3 bg-slate-50 rounded-b-xl shrink-0">
              {editingId && (
                <button onClick={() => { closeModal(); setDeleteConfirmId(editingId); }} className="mr-auto px-4 py-2 text-red-600 hover:bg-red-50 hover:text-red-700 rounded-lg font-medium flex items-center gap-2 transition-colors">
                  <IconTrash2 size={16} /> Delete
                </button>
              )}
              <button onClick={closeModal} className="px-4 py-2 text-slate-600 hover:text-slate-800 font-medium">Cancel</button>
              <button onClick={handleSaveTask} disabled={!newTask.title || (newTask.dependency === 'External' && !newTask.department) || isDateInvalid} className="px-6 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg font-medium disabled:opacity-50 disabled:cursor-not-allowed shadow-sm transition-colors">
                {editingId ? 'Save Changes' : 'Add Action Item'}
              </button>
            </div>
          </div>
        </div>
      )}

      {deleteConfirmId && (
        <div className="fixed inset-0 bg-black/40 backdrop-blur-sm flex items-center justify-center z-[120] p-4">
          <div className="bg-white rounded-xl shadow-xl w-full max-w-sm border border-slate-200 p-6 text-center animate-in zoom-in-95 duration-200">
            <IconAlertCircle className="w-12 h-12 text-red-500 mx-auto mb-4" />
            <h3 className="text-lg font-bold text-slate-800 mb-2">Delete Task?</h3>
            <p className="text-sm text-slate-500 mb-6">Are you sure you want to delete this task? This action cannot be undone.</p>
            <div className="flex justify-center gap-3">
              <button onClick={() => setDeleteConfirmId(null)} className="px-4 py-2 text-slate-600 hover:bg-slate-100 rounded-lg font-medium transition-colors">Cancel</button>
              <button onClick={confirmDelete} className="px-4 py-2 bg-red-600 hover:bg-red-700 text-white rounded-lg font-medium shadow-sm transition-colors">Delete Permanently</button>
            </div>
          </div>
        </div>
      )}

      {notification && (
        <div className="fixed bottom-4 right-4 bg-slate-800 text-white px-4 py-3 rounded-lg shadow-lg z-[130] flex items-center gap-2 animate-in slide-in-from-bottom-2">
          {notification.includes("successfully") || notification.includes("executed") || notification.includes("Cloud") || notification.includes("cloud") ? <IconCheckCircle2 size={16} className="text-green-400" /> : <IconAlertCircle size={16} className="text-blue-400" />}
          <span className="text-sm font-medium">{notification}</span>
          <button onClick={() => setNotification('')} className="text-slate-400 hover:text-white ml-2"><IconX size={14} /></button>
        </div>
      )}
    </div>
  );
}

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ComplianceGantt />);
    </script>
</body>
</html>
