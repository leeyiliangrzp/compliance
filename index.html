        // --- 2. Constants ---
        const CLASSIFICATIONS = [
          'Governance & Oversight', 'Risk Assessment & Framework', 'Systems & Technology',

        const generateId = () => typeof crypto !== 'undefined' && crypto.randomUUID ? crypto.randomUUID() : Date.now().toString(36) + Math.random().toString(36).substring(2);

        const snapDate = (dateObj) => {
          const d = new Date(dateObj);
          const day = d.getDate();
          const lastDay = new Date(d.getFullYear(), d.getMonth() + 1, 0).getDate();
          
          const dist1 = day - 1;
          const dist15 = Math.abs(day - 15);
          const distLast = lastDay - day;
          
          const min = Math.min(dist1, dist15, distLast);
          if (min === dist1) d.setDate(1);
          else if (min === dist15) d.setDate(15);
          else d.setDate(lastDay);
          return d;
        };

        // --- 3. Main Application Component ---
        function ComplianceGantt() {
          const [tasks, setTasks] = useState([]);
          const [view, setView] = useState('timeline');
          const [isModalOpen, setIsModalOpen] = useState(false);
          const [editingId, setEditingId] = useState(null);

          const timelineGridRef = useRef(null);
          const exportMenuRef = useRef(null);
          
          const [deleteConfirmId, setDeleteConfirmId] = useState(null);
          const [notification, setNotification] = useState('');
          const [showFilters, setShowFilters] = useState(false);
          const [isFullscreen, setIsFullscreen] = useState(false);
          const [isCustomTrigger, setIsCustomTrigger] = useState(false);
          const [isPdfMode, setIsPdfMode] = useState(false);
          const [showExportMenu, setShowExportMenu] = useState(false);
          const containerRef = useRef(null);
          
          const [dragState, setDragState] = useState(null); 

          const [activeFilters, setActiveFilters] = useState({
            classification: 'All', status: 'All', dependency: 'All', department: 'All'
          });
          const [sortBy, setSortBy] = useState('default'); 
          const [timelineScale, setTimelineScale] = useState('months');

          const [apiKey, setApiKey] = useState('');
          const [aiResponse, setAiResponse] = useState('');
          const [isAiLoading, setIsAiLoading] = useState(false);

          const [newTask, setNewTask] = useState({
            title: '', description: '', classification: CLASSIFICATIONS[0], status: STATUSES[0],
            dependency: DEPENDENCIES[0], department: '', scheduleType: 'Absolute Date', triggerEvent: TRIGGER_EVENTS[0],
            triggerOffset: 30, startDate: '2026-04-01', endDate: '2026-04-30'
          });

          // FIREBASE SYNC REF
          const isRemoteUpdate = useRef(false);

          // Setup effect hooks
          useEffect(() => {
            // FIREBASE CLOUD SYNC INITIALIZATION
            const setupFirebase = async () => {
                try {
                    // Dynamically import Firebase so it plays nice with Babel
                    const { initializeApp } = await import("https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js");
                    const { getDatabase, ref, set, onValue } = await import("https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js");

                    const firebaseConfig = {
                        apiKey: "AIzaSyDBUGby8pv_YzFrED7kQm1nMydxwbzArew",
                        authDomain: "compliance-json-storage.firebaseapp.com",
                        databaseURL: "https://compliance-json-storage-default-rtdb.asia-southeast1.firebasedatabase.app",
                        projectId: "compliance-json-storage",
                        storageBucket: "compliance-json-storage.firebasestorage.app",
                        messagingSenderId: "94949340652",
                        appId: "1:94949340652:web:f49aa96d667480e7433cc9"
                    };

                    const app = initializeApp(firebaseConfig);
                    const db = getDatabase(app);
                    const tasksRef = ref(db, 'sharedData/tasks');

                    // Save tools to window so the save-effect can reach them
                    window.firebaseSet = set;
                    window.firebaseRef = tasksRef;

                    // Listen for changes from the cloud
                    onValue(tasksRef, (snapshot) => {
                        const data = snapshot.val();
                        if (data) {
                            // Mark that this update came from the cloud to prevent an infinite saving loop
                            isRemoteUpdate.current = true;
                            setTasks(data);
                        } else {
                            setTasks([]); // Empty database
                        }
                        setLoading(false);
                    });
                } catch (error) {
                    console.error("Firebase Initialization Error:", error);
                    setLoading(false);
                }
            };

            setupFirebase();

            // Load API key from local storage (We still keep the API key local for security)
            const savedKey = localStorage.getItem('gemini_api_key');
            if (savedKey) setApiKey(savedKey);
          }, []);

          // FIREBASE SAVE EFFECT (Runs whenever tasks change)
          useEffect(() => {
            if (!loading) {
                if (isRemoteUpdate.current) {
                    // Reset the flag if the data came from Firebase
                    isRemoteUpdate.current = false;
                } else {
                    // This was a local change, send it to the cloud!
                    if (window.firebaseSet && window.firebaseRef) {
                        window.firebaseSet(window.firebaseRef, tasks);
                    }
                }
            }
          }, [tasks, loading]);

          useEffect(() => {
            const handleClickOutside = (event) => {
              if (exportMenuRef.current && !exportMenuRef.current.contains(event.target)) {
                setShowExportMenu(false);
              }
            };
            document.addEventListener("mousedown", handleClickOutside);
            return () => document.removeEventListener("mousedown", handleClickOutside);
          }, []);

          useEffect(() => {
            const handleFsChange = () => {
              const isNative = !!(document.fullscreenElement || document.webkitFullscreenElement || document.msFullscreenElement);
              if (!isNative && isFullscreen) setIsFullscreen(false);
              else if (isNative && !isFullscreen) setIsFullscreen(true);
            };
            document.addEventListener('fullscreenchange', handleFsChange);
            return () => document.removeEventListener('fullscreenchange', handleFsChange);
          }, [isFullscreen]);

          const saveApiKey = (key) => {
              setApiKey(key);
              localStorage.setItem('gemini_api_key', key);
              showNotification("API Key saved securely to browser storage.");
          };

          // Drag logic
          useEffect(() => {
            if (!dragState) return;

            const handleMouseMove = (e) => {
              if (!timelineGridRef.current) return;
              const diffX = e.clientX - dragState.startX;
              const timelineWidth = timelineGridRef.current.offsetWidth;
              const totalDaysInTimeline = 365; 
              const pixelsPerDay = timelineWidth / totalDaysInTimeline;
              const shiftDays = Math.round(diffX / pixelsPerDay);
              setDragState(prev => ({ ...prev, shiftDays }));
            };

            const handleMouseUp = () => {
              if (dragState.shiftDays !== 0) {
                let nStart = new Date(dragState.initialStart);
                let nEnd = new Date(dragState.initialEnd);

                if (dragState.mode === 'move') {
                  nStart.setDate(nStart.getDate() +
