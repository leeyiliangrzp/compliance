const CLASSIFICATIONS = ['Governance & Oversight', 'Risk Assessment & Framework', 'Systems & Technology', 'Operational Processes', 'Team Training', 'Regulatory Readiness'];

// SECURITY HASH (One-way cyclic bitwise hash to prevent reverse-engineering from public repositories)
const generateHash = (str) => {
    let h = 0x12345678;
    for (let i = 0; i < str.length; i++) {
        h ^= str.charCodeAt(i);
        h = ((h << 1) | (h >>> 31)) >>> 0;
    }
    return h;
};
const EXPECTED_HASH = 0xD1588A8C;

const CLASSIFICATION_COLORS = {
'Governance & Oversight': 'bg-purple-500', 'Risk Assessment & Framework': 'bg-red-500',

};

const generateId = () => typeof crypto !== 'undefined' && crypto.randomUUID ? crypto.randomUUID() : Date.now().toString(36) + Math.random().toString(36).substring(2);

const snapDate = (dateObj) => {
const d = new Date(dateObj);
const day = d.getDate();
const lastDay = new Date(d.getFullYear(), d.getMonth() + 1, 0).getDate();

const dist1 = day - 1;
const dist15 = Math.abs(day - 15);
const distLast = lastDay - day;

const min = Math.min(dist1, dist15, distLast);
if (min === dist1) d.setDate(1);
else if (min === dist15) d.setDate(15);
else d.setDate(lastDay);
return d;
};

function ComplianceGantt() {

// --- DUAL AI ENGINE STATE ---
const [hasSavedKeys, setHasSavedKeys] = useState(!!(localStorage.getItem('gemini_api_key') || localStorage.getItem('openrouter_api_key')));
const [aiEngine, setAiEngine] = useState(localStorage.getItem('ai_engine_pref') || 'gemini'); 
const [geminiKey, setGeminiKey] = useState(localStorage.getItem('gemini_api_key') || '');
const [openRouterKey, setOpenRouterKey] = useState(localStorage.getItem('openrouter_api_key') || '');
const [aiResponse, setAiResponse] = useState('');
const [isAiLoading, setIsAiLoading] = useState(false);

const [newTask, setNewTask] = useState({
title: '', description: '', classification: CLASSIFICATIONS[0], status: STATUSES[0],
dependency: DEPENDENCIES[0], department: '', scheduleType: 'Absolute Date', triggerEvent: TRIGGER_EVENTS[0],
triggerOffset: 30, startDate: '2026-04-01', endDate: '2026-04-30'
});

// FIREBASE SYNC REF
const isRemoteUpdate = useRef(false);

const saveToHistory = (newTasks) => {
setHistoryState(prev => {
const nextStack = prev.stack.slice(0, prev.step + 1);
const stateStr = JSON.stringify(newTasks);
if (nextStack.length > 0 && nextStack[nextStack.length - 1] === stateStr) {
return prev;
}
nextStack.push(stateStr);
if (nextStack.length > 50) nextStack.shift(); 
return { stack: nextStack, step: nextStack.length - 1 };
});
};

const undo = () => {
setHistoryState(prev => {
if (prev.step > 0) {
const newStep = prev.step - 1;
const prevTasks = JSON.parse(prev.stack[newStep]);
isUndoRedo.current = true; 
setTasks(prevTasks);
showNotification("Action Undone");
return { ...prev, step: newStep };
}
return prev;
});
};

const redo = () => {
setHistoryState(prev => {
if (prev.step < prev.stack.length - 1) {
const newStep = prev.step + 1;
const nextTasks = JSON.parse(prev.stack[newStep]);
isUndoRedo.current = true;
setTasks(nextTasks);
showNotification("Action Redone");
return { ...prev, step: newStep };
}
return prev;
});
};

useEffect(() => {
const handleKeyDown = (e) => {
const isMod = e.ctrlKey || e.metaKey;
if (isMod && e.key.toLowerCase() === 'z') {
e.preventDefault();
if (e.shiftKey) redo(); else undo();
}
if (isMod && e.key.toLowerCase() === 'y') {
e.preventDefault();
redo();
}
};
window.addEventListener('keydown', handleKeyDown);
return () => window.removeEventListener('keydown', handleKeyDown);
}, [historyState]);

// Setup effect hooks
useEffect(() => {
try {
const firebaseConfig = {
apiKey: "AIzaSyDBUGby8pv_YzFrED7kQm1nMydxwbzArew",
authDomain: "compliance-json-storage.firebaseapp.com",
databaseURL: "https://compliance-json-storage-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId: "compliance-json-storage",
storageBucket: "compliance-json-storage.firebasestorage.app",
messagingSenderId: "94949340652",
appId: "1:94949340652:web:f49aa96d667480e7433cc9"
};

if (!window.firebase.apps.length) {
window.firebase.initializeApp(firebaseConfig);
}

const db = window.firebase.database();
const tasksRef = db.ref('sharedData/tasks');

window.firebaseDbRef = tasksRef;

tasksRef.on('value', (snapshot) => {
// Ignore incoming updates if the user has unsaved local changes to prevent overwriting
if (hasUnsavedChanges && !isSessionAuthenticated) return; 

const data = snapshot.val();
isRemoteUpdate.current = true; 
const incomingTasks = data || [];
setTasks(incomingTasks);

setHistoryState(prev => {
if (prev.stack.length === 0) {
return { stack: [JSON.stringify(incomingTasks)], step: 0 };
}
return prev;
});

setLoading(false);
});
} catch (error) {
console.error("Firebase Initialization Error:", error);
setLoading(false);
}
}, [hasUnsavedChanges, isSessionAuthenticated]);

// FIREBASE GATED SAVE EFFECT
useEffect(() => {
if (!loading) {
if (isRemoteUpdate.current) {
isRemoteUpdate.current = false;
saveToHistory(tasks);
} else {
if (window.firebaseDbRef) {
const cleanTasks = JSON.parse(JSON.stringify(tasks)); 

if (isSessionAuthenticated) {
    // If authenticated, perform auto-save
    window.firebaseDbRef.set(cleanTasks).catch(error => {
        console.error("Firebase Save Error:", error);
        showNotification("Error: Could not save to cloud.");
    });
    setHasUnsavedChanges(false);
} else {
    // Not authenticated - flag that changes are pending
    setHasUnsavedChanges(true);
}

// History Tracking
if (isUndoRedo.current) {
    isUndoRedo.current = false; 
} else {
    saveToHistory(cleanTasks); 
}
}
}
}
}, [tasks, loading, isSessionAuthenticated]);

// Handle Manual Sync Button
const handleManualSync = () => {
    if (isSessionAuthenticated && !hasUnsavedChanges) {
        // User clicked the 'Synced' button -> Toggle offline mode
        sessionStorage.removeItem('sync_auth');
        setIsSessionAuthenticated(false);
        showNotification("Session unsynced. Reverted to offline mode.");
    } else if (isSessionAuthenticated && hasUnsavedChanges) {
        // Just force a sync to be sure
        const cleanTasks = JSON.parse(JSON.stringify(tasks));
        window.firebaseDbRef.set(cleanTasks);
        setHasUnsavedChanges(false);
        showNotification("All changes synced to cloud!");
    } else {
        // Needs authentication
        setGatewayOpen(true);
    }
};

const handleAuthSubmit = () => {
    if (generateHash(phrase) === EXPECTED_HASH) {
        sessionStorage.setItem('sync_auth', 'true');
        setIsSessionAuthenticated(true);
        setGatewayOpen(false);
        setPhrase('');
        
        // Execute pending sync immediately
        const cleanTasks = JSON.parse(JSON.stringify(tasks));
        window.firebaseDbRef.set(cleanTasks);
        setHasUnsavedChanges(false);
        
        showNotification("Authenticated & Changes Synced to Cloud!");
    } else {
        showNotification("Invalid phrase. Sync aborted.");
    }
};

// Drag logic
useEffect(() => {
if (!dragState) return;

const handleMouseMove = (e) => {
if (dragState.taskType === 'T + X Trigger') {
if (!triggerGridRef.current) return;
const diffX = e.clientX - dragState.startX;
const timelineWidth = triggerGridRef.current.offsetWidth;
const totalDays = 180; 
const pixelsPerDay = timelineWidth / totalDays;
const shiftDays = Math.round(diffX / pixelsPerDay);
setDragState(prev => ({ ...prev, shiftDays }));
} else {
if (!timelineGridRef.current) return;
const diffX = e.clientX - dragState.startX;
const timelineWidth = timelineGridRef.current.offsetWidth;
const totalDaysInTimeline = 365; 
const pixelsPerDay = timelineWidth / totalDaysInTimeline;
const shiftDays = Math.round(diffX / pixelsPerDay);
setDragState(prev => ({ ...prev, shiftDays }));
}
};

const handleMouseUp = () => {
if (dragState.shiftDays !== 0) {
if (dragState.taskType === 'T + X Trigger') {
let newOffset = dragState.initialOffset + dragState.shiftDays;
newOffset = Math.max(1, Math.round(newOffset / 5) * 5);

setTasks(prevTasks => prevTasks.map(t => {
if (t.id === dragState.id) {
return { ...t, triggerOffset: newOffset };
}
return t;
}));
showNotification("Trigger duration snapped locally.");
} else {
let nStart = new Date(dragState.initialStart);
let nEnd = new Date(dragState.initialEnd);

if (dragState.mode === 'move') {
nStart.setDate(nStart.getDate() + dragState.shiftDays);
nEnd.setDate(nEnd.getDate() + dragState.shiftDays);
nStart = snapDate(nStart);
nEnd = snapDate(nEnd);
if (nStart > nEnd) nEnd = new Date(nStart);
} else if (dragState.mode === 'resize-left') {
nStart.setDate(nStart.getDate() + dragState.shiftDays);
nStart = snapDate(nStart);
if (nStart > nEnd) nStart = new Date(nEnd); 
} else if (dragState.mode === 'resize-right') {
nEnd.setDate(nEnd.getDate() + dragState.shiftDays);
nEnd = snapDate(nEnd);
if (nEnd < nStart) nEnd = new Date(nStart); 
}

const formatLocal = (d) => {
const year = d.getFullYear();
const month = String(d.getMonth() + 1).padStart(2, '0');
const day = String(d.getDate()).padStart(2, '0');
return `${year}-${month}-${day}`;
};

setTasks(prevTasks => prevTasks.map(t => {
if (t.id === dragState.id) {

if (activeFilters.dependency === 'External' && activeFilters.department !== 'All') {
result = result.filter(t => t.department === activeFilters.department);
}

result.sort((a, b) => {
if (sortBy === 'default') {
const classA = CLASSIFICATIONS.indexOf(a.classification);
const classB = CLASSIFICATIONS.indexOf(b.classification);
const classDiff = (classA === -1 ? 99 : classA) - (classB === -1 ? 99 : classB);
if (classDiff !== 0) return classDiff;

const startA = new Date(a.startDate || 0).getTime() || 0;
const startB = new Date(b.startDate || 0).getTime() || 0;
if (startA !== startB) return startA - startB;

const endA = new Date(a.endDate || 0).getTime() || 0;
const endB = new Date(b.endDate || 0).getTime() || 0;
if (endA !== endB) return endA - endB;

const depA = a.dependency === 'External' ? 1 : 0;
const depB = b.dependency === 'External' ? 1 : 0;
return depA - depB;
}
if (sortBy === 'startDate') return new Date(a.startDate || 0) - new Date(b.startDate || 0);
if (sortBy === 'title') return (a.title || '').localeCompare(b.title || '');
if (sortBy === 'status') return (a.status || '').localeCompare(b.status || '');
if (sortBy === 'classification') {
const weightA = CLASSIFICATIONS.indexOf(a.classification);
const weightB = CLASSIFICATIONS.indexOf(b.classification);
return (weightA === -1 ? 99 : weightA) - (weightB === -1 ? 99 : weightB);
}
return 0;
});

return result;

const highRisk = [];

const start = new Date(t.startDate).getTime();

overdue.push(t);
} else if ((t.status === 'Not Started' && start <= plus14Ms) || (t.status === 'In Progress' && end <= plus14Ms)) {
highRisk.push(t);

});

return {
overdueTasks: overdue,
highRiskTasks: highRisk,
chartData: {
notStarted: Math.round((cNotStarted/total)*100),

const getBarStyles = (task) => {
const fyStart = new Date(FY_START_YEAR, FY_START_MONTH, 1).getTime();
const fyEnd = new Date(FY_START_YEAR + 1, FY_START_MONTH, 0).getTime();
const totalDuration = fyEnd - fyStart;

let taskStart = new Date(task.startDate).getTime();
let taskEnd = new Date(task.endDate).getTime();

if (dragState && dragState.id === task.id) {
const shiftMs = dragState.shiftDays * 24 * 60 * 60 * 1000;
let tempStart = new Date(task.startDate);
let tempEnd = new Date(task.endDate);

if (dragState.mode === 'move') {
tempStart.setTime(tempStart.getTime() + shiftMs);
tempEnd.setTime(tempEnd.getTime() + shiftMs);
tempStart = snapDate(tempStart);
tempEnd = snapDate(tempEnd);
if (tempStart > tempEnd) tempEnd = new Date(tempStart);
} else if (dragState.mode === 'resize-left') {
tempStart.setTime(tempStart.getTime() + shiftMs);
tempStart = snapDate(tempStart);
if (tempStart > tempEnd) tempStart = new Date(tempEnd);
} else if (dragState.mode === 'resize-right') {
tempEnd.setTime(tempEnd.getTime() + shiftMs);
tempEnd = snapDate(tempEnd);
if (tempEnd < tempStart) tempEnd = new Date(tempStart);
}
taskStart = tempStart.getTime();
taskEnd = tempEnd.getTime();
}

const effectiveStart = Math.max(taskStart, fyStart);
const effectiveEnd = Math.min(taskEnd, fyEnd);

if (effectiveEnd < effectiveStart) return { display: 'none' };

const leftPercent = ((effectiveStart - fyStart) / totalDuration) * 100;
const widthPercent = ((effectiveEnd - effectiveStart) / totalDuration) * 100;

return { left: `${leftPercent}%`, width: `${Math.max(widthPercent, 0.5)}%` };
};

const getTriggerBarStyles = (task) => {

const maxScaleDays = 180;
const rawPercent = (offset / maxScaleDays) * 100;
const widthPct = Math.min(Math.max(rawPercent, 2), 100);
return { left: '0%', width: `${widthPct}%` };
};

</div>
<div>
<label className="block text-xs md:text-sm font-medium text-slate-700 mb-1">Dependency</label>
<select className="w-full border border-slate-300 rounded-lg p-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none bg-white" value={newTask.dependency} onChange={e => setNewTask({...newTask, dependency: e.target.value, department: ''})}>
{DEPENDENCIES.map(d => <option key={d} value={d}>{d}</option>)}
</select>
</div>
{newTask.dependency === 'External' && (
<div className="sm:col-span-2 animate-in fade-in duration-200">
<label className="block text-xs md:text-sm font-medium text-slate-700 mb-1">Department</label>
<select className="w-full border border-blue-300 rounded-lg p-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none bg-blue-50" value={newTask.department} onChange={e => setNewTask({...newTask, department: e.target.value})}>
<option value="" disabled>Select Dept...</option>
{DEPARTMENTS.map(d => <option key={d} value={d}>{d}</option>)}
</select>
</div>
)}
</div>

<div className="border border-indigo-100 rounded-lg overflow-hidden">
<div className="bg-indigo-50 p-2.5 md:p-3 border-b border-indigo-100 flex items-center justify-between">
<label className="text-xs md:text-sm font-semibold text-indigo-900">Schedule Type</label>
<select className="border border-indigo-200 text-indigo-800 text-[10px] md:text-sm rounded-md p-1 outline-none bg-white font-medium" value={newTask.scheduleType} onChange={e => setNewTask({...newTask, scheduleType: e.target.value})}>
{SCHEDULE_TYPES.map(t => <option key={t} value={t}>{t}</option>)}
</select>
</div>

<div className="p-3 md:p-4 bg-white grid grid-cols-1 sm:grid-cols-2 gap-3 md:gap-4">
{newTask.scheduleType === 'T + X Trigger' ? (
<>
<div>
<div className="flex justify-between items-center mb-1">
<label className="block text-xs md:text-sm font-medium text-slate-700">Trigger Event (T)</label>
{isCustomTrigger && (
<button type="button" onClick={() => { setIsCustomTrigger(false); setNewTask({...newTask, triggerEvent: TRIGGER_EVENTS[0]}); }} className="text-[10px] text-indigo-600 hover:underline">Use Preset</button>
)}
</div>
{isCustomTrigger ? (
<input type="text" className="w-full border border-slate-300 rounded-lg p-2 text-sm focus:ring-2 focus:ring-indigo-500 outline-none bg-white" placeholder="Enter custom trigger..." value={newTask.triggerEvent} onChange={e => setNewTask({...newTask, triggerEvent: e.target.value})} />
) : (
<select className="w-full border border-slate-300 rounded-lg p-2 text-sm focus:ring-2 focus:ring-indigo-500 outline-none bg-white" value={TRIGGER_EVENTS.includes(newTask.triggerEvent) ? newTask.triggerEvent : 'custom'} onChange={e => {
if (e.target.value === 'custom') {
setIsCustomTrigger(true);
setNewTask({...newTask, triggerEvent: ''});
} else {
setNewTask({...newTask, triggerEvent: e.target.value});
}
}}>
{TRIGGER_EVENTS.map(t => <option key={t} value={t}>{t}</option>)}
<option value="custom">+ Custom Trigger...</option>
</select>
)}
</div>
<div>
<label className="block text-xs md:text-sm font-medium text-slate-700 mb-1">Task Duration (Days) [X]</label>
<div className="flex items-center gap-2">
<input type="number" min="1" className="w-full border border-slate-300 rounded-lg p-2 text-sm focus:ring-2 focus:ring-indigo-500 outline-none" value={newTask.triggerOffset} onChange={e => setNewTask({...newTask, triggerOffset: parseInt(e.target.value) || 1})} />
<span className="font-bold text-xs md:text-sm text-slate-400">Days</span>
</div>
</div>

<div className="mt-2 pt-3 md:mt-4 md:pt-4 border-t border-indigo-100 sm:col-span-2">
<label className="block text-xs md:text-sm font-bold text-indigo-900 mb-2 flex items-center gap-2"><IconCheckCircle2 size={16}/> Define T: Did the Trigger occur?</label>
<div className="flex flex-col sm:flex-row items-start sm:items-center gap-2 md:gap-3">
<input type="date" 
className="w-full sm:w-auto border border-indigo-200 rounded-lg p-2 focus:ring-2 focus:ring-indigo-500 outline-none text-xs md:text-sm text-indigo-800 font-bold"
onChange={(e) => {
if(e.target.value) {
const start = new Date(e.target.value);
const end = new Date(start);
end.setDate(end.getDate() + newTask.triggerOffset);

const formatLocal = (d) => {
const year = d.getFullYear();
const month = String(d.getMonth() + 1).padStart(2, '0');
const day = String(d.getDate()).padStart(2, '0');
return `${year}-${month}-${day}`;
};

setNewTask({
...newTask,
scheduleType: 'Absolute Date',
startDate: formatLocal(start),
endDate: formatLocal(end)
});
showNotification("Trigger executed! Task moved to main timeline.");
}
}}
/>
<span className="text-[10px] md:text-xs text-indigo-600 italic">Enter the actual date to automatically move this task to the main timeline spanning X days.</span>
</div>
</div>
</>
) : (
<>
<div>
<label className="block text-xs md:text-sm font-medium text-slate-700 mb-1">Start Date</label>
<input type="date" className="w-full border border-slate-300 rounded-lg p-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none" value={newTask.startDate} onChange={e => setNewTask({...newTask, startDate: e.target.value})} />
</div>
<div>
<label className="block text-xs md:text-sm font-medium text-slate-700 mb-1">End Date</label>
<input type="date" className="w-full border border-slate-300 rounded-lg p-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none" value={newTask.endDate} onChange={e => setNewTask({...newTask, endDate: e.target.value})} />
</div>
{isDateInvalid && (
<div className="sm:col-span-2 text-[10px] md:text-xs text-red-500 font-medium flex items-center gap-1 mt-1">
<IconAlertCircle size={14} /> Start Date is post-dated after the End Date specified.
</div>
)}
</>
)}
</div>
</div>

<div>
<label className="block text-xs md:text-sm font-medium text-slate-700 mb-1">Initial Status</label>
<select className="w-full border border-slate-300 rounded-lg p-2 md:p-2.5 text-sm focus:ring-2 focus:ring-blue-500 outline-none bg-white" value={newTask.status} onChange={e => setNewTask({...newTask, status: e.target.value})}>
{STATUSES.map(s => <option key={s} value={s}>{s}</option>)}
</select>
</div>
</div>

<div className="p-4 md:p-6 border-t border-slate-100 flex justify-end gap-2 md:gap-3 bg-slate-50 rounded-b-xl shrink-0">
{editingId && (
<button onClick={() => { closeModal(); setDeleteConfirmId(editingId); }} className="mr-auto px-3 md:px-4 py-1.5 md:py-2 text-red-600 hover:bg-red-50 hover:text-red-700 rounded-lg text-xs md:text-sm font-medium flex items-center gap-1 md:gap-2 transition-colors">
<IconTrash2 size={16} className="w-4 h-4 md:w-5 md:h-5" /> <span className="hidden sm:inline">Delete</span>
</button>
)}
<button onClick={closeModal} className="px-3 md:px-4 py-1.5 md:py-2 text-slate-600 text-xs md:text-sm hover:text-slate-800 font-medium">Cancel</button>
<button onClick={handleSaveTask} disabled={!newTask.title || (newTask.dependency === 'External' && !newTask.department) || isDateInvalid} className="px-4 md:px-6 py-1.5 md:py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg text-xs md:text-sm font-medium disabled:opacity-50 disabled:cursor-not-allowed shadow-sm transition-colors">
{editingId ? 'Save' : 'Add Item'}
</button>
</div>
</div>
</div>
)}

{/* CONFIRM DELETE MODAL */}
{deleteConfirmId && (
<div className="fixed inset-0 bg-black/40 backdrop-blur-sm flex items-center justify-center z-[120] p-4">
<div className="bg-white rounded-xl shadow-xl w-full max-w-sm border border-slate-200 p-5 md:p-6 text-center animate-in zoom-in-95 duration-200">
<IconAlertCircle className="w-10 h-10 md:w-12 md:h-12 text-red-500 mx-auto mb-3 md:mb-4" />
<h3 className="text-base md:text-lg font-bold text-slate-800 mb-1 md:mb-2">Delete Task?</h3>
<p className="text-xs md:text-sm text-slate-500 mb-5 md:mb-6">Are you sure you want to delete this task locally? You must still sync to cloud after.</p>
<div className="flex justify-center gap-2 md:gap-3">
<button onClick={() => setDeleteConfirmId(null)} className="px-3 md:px-4 py-2 text-xs md:text-sm text-slate-600 hover:bg-slate-100 rounded-lg font-medium transition-colors">Cancel</button>
<button onClick={confirmDelete} className="px-3 md:px-4 py-2 bg-red-600 hover:bg-red-700 text-white text-xs md:text-sm rounded-lg font-medium shadow-sm transition-colors">Delete Permanently</button>
</div>
</div>
</div>
)}

{/* NOTIFICATIONS */}
{notification && (
<div className="fixed bottom-4 left-4 right-4 md:left-auto md:right-4 bg-slate-800 text-white px-4 py-3 rounded-lg shadow-lg z-[130] flex items-center justify-between md:justify-start gap-2 animate-in slide-in-from-bottom-2">
<div className="flex items-center gap-2">
{notification.includes("successfully") || notification.includes("executed") || notification.includes("Cloud") || notification.includes("cloud") ? <IconCheckCircle2 className="text-green-400 w-4 h-4 md:w-5 md:h-5" /> : <IconAlertCircle className="text-blue-400 w-4 h-4 md:w-5 md:h-5" />}
<span className="text-xs md:text-sm font-medium">{notification}</span>
</div>
<button onClick={() => setNotification('')} className="text-slate-400 hover:text-white ml-2 shrink-0"><IconX size={14} /></button>
</div>
)}
</div>
);
}

// --- 4. Main App Wrapper (Authentication Layer) ---
function App() {
    const [isAppUnlocked, setIsAppUnlocked] = useState(!!sessionStorage.getItem('app_unlocked'));
    const [appPassword, setAppPassword] = useState('');
    const [appLockError, setAppLockError] = useState(false);

    const handleAppUnlock = () => {
        if (generateHash(appPassword) === EXPECTED_HASH) {
            sessionStorage.setItem('app_unlocked', 'true');
            setIsAppUnlocked(true);
        } else {
            setAppLockError(true);
        }
    };

    if (!isAppUnlocked) {
        return (
            <div className="min-h-screen bg-slate-900 flex items-center justify-center p-4 font-sans relative overflow-hidden">
                <div className="absolute inset-0 opacity-10 pointer-events-none" style={{ backgroundImage: 'radial-gradient(#ffffff 1px, transparent 1px)', backgroundSize: '24px 24px' }}></div>
                
                <div className="bg-white rounded-xl shadow-2xl w-full max-w-md border border-slate-200 overflow-hidden relative z-10 animate-in zoom-in-95 duration-300">
                    <div className="bg-slate-50 p-6 border-b border-slate-100 flex flex-col items-center text-center">
                        <div className="w-16 h-16 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center mb-4">
                            <IconLock className="w-8 h-8" />
                        </div>
                        <h2 className="text-2xl font-bold text-slate-800">Compliance Workplan</h2>
                        <p className="text-sm text-slate-500 mt-2">Razorpay Singapore FY 26/27</p>
                    </div>
                    <div className="p-6 md:p-8">
                        <label className="block text-sm font-bold text-slate-700 mb-2">Access Password</label>
                        <input
                            type="password"
                            placeholder="Enter password..."
                            className={`w-full border ${appLockError ? 'border-red-500 ring-1 ring-red-500' : 'border-slate-300'} rounded-lg p-3 text-center tracking-widest focus:ring-2 focus:ring-blue-500 outline-none transition-colors`}
                            value={appPassword}
                            onChange={(e) => { setAppPassword(e.target.value); setAppLockError(false); }}
                            onKeyDown={(e) => e.key === 'Enter' && handleAppUnlock()}
                            autoFocus
                        />
                        {appLockError && <p className="text-xs text-red-500 mt-2 text-center font-medium">Incorrect password. Please try again.</p>}
                        
                        <button
                            onClick={handleAppUnlock}
                            className="w-full mt-6 py-3 bg-blue-600 hover:bg-blue-700 text-white rounded-lg font-bold shadow-sm transition-colors flex items-center justify-center gap-2"
                        >
                            <IconUnlock className="w-5 h-5" /> Unlock Application
                        </button>
                    </div>
                </div>
            </div>
        );
    }

    return <ComplianceGantt />;
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
