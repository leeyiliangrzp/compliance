<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compliance Workplan FY 26/27</title>
    
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-database-compat.js"></script>

    <style>
        body { margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        .overflow-visible { overflow: visible !important; }
        .prose h1, .prose h2, .prose h3 { margin-top: 1.5em; margin-bottom: 0.5em; color: #1e293b; }
        .prose p { margin-top: 0.5em; margin-bottom: 0.5em; }
        .prose ul { margin-top: 0.5em; margin-bottom: 1em; }
        .prose li { margin-top: 0.25em; margin-bottom: 0.25em; }
        .select-text { user-select: text !important; -webkit-user-select: text !important; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useRef, useEffect } = React;

        const SVGIcon = ({ d, children, size=24, className="" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                {d ? <path d={d} /> : children}
            </svg>
        );

        const IconPlus = (p) => <SVGIcon {...p}><path d="M5 12h14"/><path d="M12 5v14"/></SVGIcon>;
        const IconTrash2 = (p) => <SVGIcon {...p}><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></SVGIcon>;
        const IconBarChart3 = (p) => <SVGIcon {...p}><path d="M3 3v18h18"/><path d="M18 17V9"/><path d="M13 17V5"/><path d="M8 17v-3"/></SVGIcon>;
        const IconEdit = (p) => <SVGIcon {...p}><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></SVGIcon>;
        const IconX = (p) => <SVGIcon {...p}><path d="M18 6 6 18"/><path d="m6 6 12 12"/></SVGIcon>;
        const IconUndo = (p) => <SVGIcon {...p}><path d="M3 7v6h6"/><path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"/></SVGIcon>;
        const IconRedo = (p) => <SVGIcon {...p}><path d="M21 7v6h-6"/><path d="M3 17a9 9 0 0 1 9-9 9 9 0 0 1 6 2.3l3 2.7"/></SVGIcon>;
        const IconRefreshCw = (p) => <SVGIcon {...p}><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></SVGIcon>;
        const IconBrain = (p) => <SVGIcon {...p}><path d="M9.5 2A2.5 2.5 0 0 1 12 4.5v15a2.5 2.5 0 0 1-4.96.44 2.5 2.5 0 0 1-2.96-3.08 3 3 0 0 1-.34-5.58 2.5 2.5 0 0 1 1.32-4.24 2.5 2.5 0 0 1 1.98-3A2.5 2.5 0 0 1 9.5 2Z"/><path d="M14.5 2A2.5 2.5 0 0 0 12 4.5v15a2.5 2.5 0 0 0 4.96.44 2.5 2.5 0 0 0 2.96-3.08 3 3 0 0 0 .34-5.58 2.5 2.5 0 0 0-1.32-4.24 2.5 2.5 0 0 0-1.98-3A2.5 2.5 0 0 0 14.5 2Z"/></SVGIcon>;
        const IconGlobe = (p) => <SVGIcon {...p}><circle cx="12" cy="12" r="10"/><line x1="2" x2="22" y1="12" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></SVGIcon>;

        // --- Constants ---
        const CLASSIFICATIONS = ['Governance & Oversight', 'Risk Assessment & Framework', 'Systems & Technology', 'Operational Processes', 'Team Training', 'Regulatory Readiness'];
        const STATUSES = ['Not Started', 'In Progress', 'Completed'];
        const DEPARTMENTS = ['Finance', 'Product', 'Legal', 'Risk', 'Operations', 'IT'];
        const CLASSIFICATION_COLORS = { 'Governance & Oversight': 'bg-purple-500', 'Risk Assessment & Framework': 'bg-red-500', 'Systems & Technology': 'bg-blue-500', 'Operational Processes': 'bg-emerald-500', 'Team Training': 'bg-yellow-500', 'Regulatory Readiness': 'bg-orange-500' };
        const FY_START_YEAR = 2026;
        const FY_START_MONTH = 3; 

        const generateId = () => typeof crypto !== 'undefined' && crypto.randomUUID ? crypto.randomUUID() : Date.now().toString(36) + Math.random().toString(36).substring(2);

        function ComplianceGantt() {
          const [tasks, setTasks] = useState([]);
          const [history, setHistory] = useState([]);
          const [historyStep, setHistoryStep] = useState(-1);
          const [view, setView] = useState('timeline');
          const [isModalOpen, setIsModalOpen] = useState(false);
          const [editingId, setEditingId] = useState(null);
          const [loading, setLoading] = useState(true);
          const [notification, setNotification] = useState('');
          const [apiKey, setApiKey] = useState('');
          const [aiResponse, setAiResponse] = useState('');
          const [isAiLoading, setIsAiLoading] = useState(false);
          const [customPrompt, setCustomPrompt] = useState('');
          
          const [newTask, setNewTask] = useState({ 
            title: '', description: '', classification: CLASSIFICATIONS[0], status: STATUSES[0], 
            dependency: 'RISPL', department: '', scheduleType: 'Absolute Date', triggerEvent: 'IPA', 
            triggerOffset: 30, startDate: '2026-04-01', endDate: '2026-04-30' 
          });

          const isRemoteUpdate = useRef(false);
          const containerRef = useRef(null);

          // --- Undo/Redo Engine ---
          const updateTasksWithHistory = (newTasks, isFromUndoRedo = false) => {
            if (!isFromUndoRedo) {
              const newHistory = history.slice(0, historyStep + 1);
              newHistory.push(newTasks);
              if (newHistory.length > 50) newHistory.shift();
              setHistory(newHistory);
              setHistoryStep(newHistory.length - 1);
            }
            setTasks(newTasks);
          };

          const undo = () => {
            if (historyStep > 0) {
              isRemoteUpdate.current = false;
              const prevStep = historyStep - 1;
              setHistoryStep(prevStep);
              setTasks(history[prevStep]);
              showNotification("Undo action");
            }
          };

          const redo = () => {
            if (historyStep < history.length - 1) {
              isRemoteUpdate.current = false;
              const nextStep = historyStep + 1;
              setHistoryStep(nextStep);
              setTasks(history[nextStep]);
              showNotification("Redo action");
            }
          };

          // Keyboard Shortcuts
          useEffect(() => {
            const handleKeyDown = (e) => {
              if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'z') {
                e.preventDefault();
                if (e.shiftKey) redo(); else undo();
              }
              if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'y') {
                e.preventDefault();
                redo();
              }
            };
            window.addEventListener('keydown', handleKeyDown);
            return () => window.removeEventListener('keydown', handleKeyDown);
          }, [historyStep, history]);

          // Firebase Init
          useEffect(() => {
            try {
                const firebaseConfig = {
                    apiKey: "AIzaSyDBUGby8pv_YzFrED7kQm1nMydxwbzArew",
                    authDomain: "compliance-json-storage.firebaseapp.com",
                    databaseURL: "https://compliance-json-storage-default-rtdb.asia-southeast1.firebasedatabase.app",
                    projectId: "compliance-json-storage",
                    storageBucket: "compliance-json-storage.firebasestorage.app",
                    messagingSenderId: "94949340652",
                    appId: "1:94949340652:web:f49aa96d667480e7433cc9"
                };
                if (!window.firebase.apps.length) window.firebase.initializeApp(firebaseConfig);
                const db = window.firebase.database();
                const tasksRef = db.ref('sharedData/tasks');
                window.firebaseDbRef = tasksRef;

                tasksRef.on('value', (snapshot) => {
                    const data = snapshot.val() || [];
                    isRemoteUpdate.current = true;
                    setTasks(data);
                    if (history.length === 0) {
                        setHistory([data]);
                        setHistoryStep(0);
                    }
                    setLoading(false);
                });
            } catch (error) { console.error(error); setLoading(false); }
            const savedKey = localStorage.getItem('gemini_api_key');
            if (savedKey) setApiKey(savedKey);
          }, []);

          // Sync local changes to cloud
          useEffect(() => {
            if (!loading) {
                if (isRemoteUpdate.current) {
                    isRemoteUpdate.current = false;
                } else {
                    if (window.firebaseDbRef) {
                        window.firebaseDbRef.set(tasks);
                    }
                }
            }
          }, [tasks]);

          const showNotification = (msg) => { setNotification(msg); setTimeout(() => setNotification(''), 3000); };

          // --- AI Insights Logic ---
          const fetchInsights = async (promptType) => {
              if (!apiKey) return showNotification("Enter API key first");
              setIsAiLoading(true); setAiResponse('');
              try {
                  const taskString = tasks.map((t, idx) => {
                      const isFixed = !t.scheduleType || t.scheduleType.includes('Absolute') || (t.startDate && t.endDate);
                      const sched = isFixed ? `${t.startDate} to ${t.endDate}` : `T+${t.triggerOffset} (Trigger: ${t.triggerEvent})`;
                      const dep = t.dependency === 'External' ? `External (${t.department || 'Group'})` : 'Internal (RISPL)';
                      return `${idx + 1}. ${t.title} [Status: ${t.status}, Class: ${t.classification}, Schedule: ${sched}, Dep: ${dep}]`;
                  }).join('\n');
                  
                  let specificPrompt = "";
                  if (promptType === 'Holistic') {
                      specificPrompt = "As a compliance advisor, carry out a strategic analysis and summary of the workplan. Cover: 1. Key data, ratios (Internal vs External), and estimated effort needed per quarter. 2. Potential bottlenecks where too many items overlap. 3. List assumptions made. 4. Critical Suggestions for resource management: specifically suggest moving items (e.g., 'Move Item 4 to Q3') with professional justifications based on workload balance.";
                  } else {
                      specificPrompt = customPrompt;
                  }

                  const finalPrompt = `${specificPrompt}\n\nWorkplan Data:\n${taskString}\n\nCRITICAL FORMATTING:\n- Use Markdown Bullet Points.\n- Use **Bold** for dates, item numbers, and key metrics.\n- Use ### Headings for the 4 sections.\n- Start directly with the analysis. No introductory conversational filler.`;

                  const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
                      method: 'POST',
                      headers: { 'Content-Type': 'application/json' },
                      body: JSON.stringify({ contents: [{ parts: [{ text: finalPrompt }] }] })
                  });
                  const data = await response.json();
                  setAiResponse(data.candidates[0].content.parts[0].text);
              } catch (error) { setAiResponse("Error: Could not reach AI. Check API Key."); }
              setIsAiLoading(false);
          };

          const getBarStyles = (task) => {
            const fyStart = new Date(FY_START_YEAR, FY_START_MONTH, 1).getTime();
            const fyEnd = new Date(FY_START_YEAR + 1, FY_START_MONTH, 0).getTime();
            const totalDuration = fyEnd - fyStart;
            let taskStart = new Date(task.startDate || '2026-04-01').getTime();
            let taskEnd = new Date(task.endDate || '2026-04-30').getTime();
            const leftPercent = ((taskStart - fyStart) / totalDuration) * 100;
            const widthPercent = ((taskEnd - taskStart) / totalDuration) * 100;
            return { left: `${Math.max(0, leftPercent)}%`, width: `${Math.max(1, widthPercent)}%` };
          };

          const handleSaveTask = () => {
            let updated;
            if (editingId) updated = tasks.map(t => t.id === editingId ? { ...newTask, id: editingId } : t);
            else updated = [...tasks, { ...newTask, id: generateId() }];
            updateTasksWithHistory(updated);
            setIsModalOpen(false);
            showNotification("Task saved");
          };

          const openEditModal = (task) => { setEditingId(task.id); setNewTask(task); setIsModalOpen(true); };

          return (
            <div ref={containerRef} className="flex flex-col bg-slate-50 text-slate-900 h-screen relative overflow-hidden">
              
              {/* HEADER */}
              <div className="bg-white border-b border-slate-200 shadow-sm p-4 flex justify-between items-center z-50 shrink-0">
                <div className="flex items-center gap-4">
                  <div>
                    <h1 className="text-xl font-bold text-slate-800">Compliance Workplan FY 26/27</h1>
                    <div className="flex items-center gap-3 mt-1">
                       <span className="text-xs font-bold bg-blue-100 text-blue-700 px-2 py-0.5 rounded-full border border-blue-200">{tasks.length} Total Additions</span>
                       <div className="flex items-center gap-4 text-[10px] uppercase tracking-wider font-bold border-l pl-3">
                          <span className="flex items-center gap-1.5 text-red-600"><div className="w-2.5 h-2.5 rounded-full bg-red-600"></div> External/Group Dependency</span>
                          <span className="flex items-center gap-1.5 text-slate-900"><div className="w-2.5 h-2.5 rounded-full bg-slate-900"></div> Internally Managed</span>
                       </div>
                    </div>
                  </div>
                </div>

                <div className="flex items-center gap-3">
                    <div className="flex bg-slate-100 p-1 rounded-lg border border-slate-200 mr-2">
                      <button onClick={undo} disabled={historyStep <= 0} className="p-1.5 rounded-md hover:bg-white disabled:opacity-30 transition-all text-slate-600" title="Undo (Ctrl+Z)"><IconUndo size={18} /></button>
                      <button onClick={redo} disabled={historyStep >= history.length - 1} className="p-1.5 rounded-md hover:bg-white disabled:opacity-30 transition-all text-slate-600" title="Redo (Ctrl+Y)"><IconRedo size={18} /></button>
                    </div>

                    <div className="flex bg-slate-100 p-1 rounded-lg border border-slate-200">
                        <button onClick={() => setView('timeline')} className={`px-4 py-1.5 rounded-md text-sm font-bold transition-all ${view === 'timeline' ? 'bg-white shadow-sm text-blue-600' : 'text-slate-500'}`}>Timeline</button>
                        <button onClick={() => setView('ai')} className={`px-4 py-1.5 rounded-md text-sm font-bold transition-all ${view === 'ai' ? 'bg-white shadow-sm text-indigo-600' : 'text-slate-500'}`}>AI Consultant</button>
                    </div>

                    <button onClick={() => { setEditingId(null); setIsModalOpen(true); }} className="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg text-sm font-bold flex items-center gap-2 shadow-md transition-all active:scale-95">
                        <IconPlus size={18} /> <span>Add Item</span>
                    </button>
                </div>
              </div>

              {/* MAIN CONTENT */}
              <div className="flex-1 overflow-hidden p-4 flex flex-col">
                
                {view === 'timeline' && (
                  <div className="flex-1 bg-white rounded-xl border border-slate-200 shadow-sm flex flex-col overflow-auto select-none">
                    <div className="min-w-[1400px]">
                        <div className="flex border-b bg-slate-50 sticky top-0 z-10">
                           <div className="w-80 p-3 border-r font-bold text-xs text-slate-500 uppercase tracking-widest bg-slate-100/50">Compliance Action Items</div>
                           <div className="flex-1 flex">
                             {Array.from({length: 12}).map((_, i) => (
                               <div key={i} className="flex-1 border-r p-2 text-center text-[10px] font-black text-slate-400 uppercase">
                                 {new Date(2026, 3 + i, 1).toLocaleString('default', { month: 'long' })}
                               </div>
                             ))}
                           </div>
                        </div>
                        <div className="relative divide-y divide-slate-100">
                          {tasks.map((t, idx) => (
                            <div key={t.id} className="flex hover:bg-blue-50/30 transition-colors group">
                              <div className="w-80 p-3 border-r flex items-center gap-3 cursor-pointer" onClick={() => openEditModal(t)}>
                                <span className="text-[10px] font-bold text-slate-300 w-4">{idx + 1}</span>
                                <div className={`w-2 h-6 rounded-full shrink-0 ${t.dependency === 'External' ? 'bg-red-600' : 'bg-slate-900'}`}></div>
                                <span className={`text-sm font-bold truncate ${t.dependency === 'External' ? 'text-red-700' : 'text-slate-800'}`}>{t.title}</span>
                              </div>
                              <div className="flex-1 relative h-14">
                                <div 
                                  className={`absolute h-8 top-3 rounded-md shadow-sm border-b-2 border-black/10 flex items-center px-3 cursor-pointer transition-transform hover:scale-[1.01] active:scale-100 ${CLASSIFICATION_COLORS[t.classification] || 'bg-slate-400'}`} 
                                  style={getBarStyles(t)} 
                                  onClick={() => openEditModal(t)}
                                >
                                   <span className="text-[10px] text-white font-black truncate drop-shadow-md">{t.title}</span>
                                </div>
                              </div>
                            </div>
                          ))}
                        </div>
                    </div>
                  </div>
                )}

                {view === 'ai' && (
                  <div className="flex-1 flex gap-6 overflow-hidden">
                    <div className="w-80 flex flex-col gap-4 shrink-0">
                       <div className="bg-white p-6 rounded-xl border border-slate-200 shadow-sm">
                          <h2 className="font-black text-lg mb-4 flex items-center gap-2 text-indigo-700 uppercase tracking-tight"><IconBrain /> AI Consultant</h2>
                          <div className="space-y-4">
                             <button onClick={() => fetchInsights('Holistic')} disabled={isAiLoading} className="w-full text-left p-4 border-2 border-indigo-100 rounded-xl hover:bg-indigo-50 hover:border-indigo-300 transition-all font-bold text-sm text-indigo-900 shadow-sm disabled:opacity-50">
                                Run Holistic Analysis
                                <p className="text-[10px] font-medium text-indigo-500 mt-1">Resource gaps, quarter moves, and bottlenecks.</p>
                             </button>
                             <div className="pt-4 border-t">
                                <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Custom Query</label>
                                <textarea className="w-full border-2 border-slate-100 rounded-xl p-3 mt-2 text-sm h-32 focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none transition-all" placeholder="Ask anything about the plan..." value={customPrompt} onChange={e => setCustomPrompt(e.target.value)} />
                                <button onClick={() => fetchInsights('Custom')} disabled={isAiLoading || !customPrompt} className="w-full bg-slate-900 text-white mt-3 py-3 rounded-xl font-bold text-sm hover:bg-black transition-all shadow-lg disabled:opacity-50">Query Database</button>
                             </div>
                          </div>
                       </div>
                       <div className="p-4 bg-indigo-900 text-white rounded-xl shadow-inner">
                          <p className="text-[11px] font-bold opacity-80 leading-relaxed italic">"The AI assesses Internal vs External ratios and looks for 'traffic jams' in your schedule to suggest better distribution."</p>
                       </div>
                    </div>
                    <div className="flex-1 bg-white rounded-xl border border-slate-200 shadow-sm p-10 overflow-auto select-text relative">
                       {isAiLoading ? (
                          <div className="h-full flex flex-col items-center justify-center text-indigo-500">
                             <IconRefreshCw className="animate-spin mb-4" size={48} />
                             <span className="font-black text-xl animate-pulse tracking-tighter uppercase">Consulting Gemini Engine...</span>
                          </div>
                       ) : aiResponse ? (
                          <div className="prose prose-slate max-w-none [&>ul]:list-disc [&>ul]:pl-5 [&>ol]:list-decimal select-text">
                             <MarkdownParser text={aiResponse} />
                          </div>
                       ) : (
                          <div className="h-full flex flex-col items-center justify-center text-slate-300">
                             <IconGlobe size={64} className="mb-4 opacity-20" />
                             <p className="font-bold text-lg opacity-40">Ready for Strategic Review</p>
                             <p className="text-sm opacity-40">Select an analysis type on the left.</p>
                          </div>
                       )}
                    </div>
                  </div>
                )}
              </div>

              {/* MODALS */}
              {isModalOpen && (
                <div className="fixed inset-0 bg-black/60 backdrop-blur-md z-[100] flex items-center justify-center p-4">
                   <div className="bg-white rounded-2xl shadow-2xl w-full max-w-lg overflow-hidden border border-slate-300 animate-in zoom-in-95 duration-200">
                      <div className="p-6 border-b flex justify-between items-center bg-slate-50">
                         <h2 className="font-black text-xl tracking-tight">{editingId ? 'Edit Workplan Item' : 'New Compliance Item'}</h2>
                         <button onClick={() => setIsModalOpen(false)} className="text-slate-400 hover:text-slate-900 transition-colors"><IconX /></button>
                      </div>
                      <div className="p-6 space-y-5">
                         <div>
                            <label className="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1.5">Task Name</label>
                            <input className="w-full border-2 border-slate-100 p-3 rounded-xl font-bold text-slate-800 focus:border-blue-500 outline-none transition-all" value={newTask.title} onChange={e => setNewTask({...newTask, title: e.target.value})} placeholder="Enter task name..." />
                         </div>
                         <div className="grid grid-cols-2 gap-4">
                            <div>
                               <label className="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1.5">Management Type</label>
                               <select className="w-full border-2 border-slate-100 p-3 rounded-xl font-bold text-slate-700 outline-none" value={newTask.dependency} onChange={e => setNewTask({...newTask, dependency: e.target.value})}>
                                  <option value="RISPL">Internally Managed</option>
                                  <option value="External">External Dependency</option>
                               </select>
                            </div>
                            <div>
                               <label className="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1.5">Classification</label>
                               <select className="w-full border-2 border-slate-100 p-3 rounded-xl font-bold text-slate-700 outline-none" value={newTask.classification} onChange={e => setNewTask({...newTask, classification: e.target.value})}>
                                  {CLASSIFICATIONS.map(c => <option key={c} value={c}>{c}</option>)}
                               </select>
                            </div>
                         </div>
                         {newTask.dependency === 'External' && (
                            <div className="animate-in slide-in-from-top-2">
                               <label className="block text-[10px] font-black text-red-500 uppercase tracking-widest mb-1.5">External Department / Group</label>
                               <select className="w-full border-2 border-red-100 p-3 rounded-xl font-bold text-red-700 bg-red-50 outline-none" value={newTask.department} onChange={e => setNewTask({...newTask, department: e.target.value})}>
                                  <option value="">Select Responsible Dept</option>
                                  {DEPARTMENTS.map(d => <option key={d} value={d}>{d}</option>)}
                               </select>
                            </div>
                         )}
                         <div className="grid grid-cols-2 gap-4 pt-4 border-t">
                            <div>
                               <label className="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1.5">Start Date</label>
                               <input type="date" className="w-full border-2 border-slate-100 p-3 rounded-xl font-bold text-slate-700 outline-none" value={newTask.startDate} onChange={e => setNewTask({...newTask, startDate: e.target.value})} />
                            </div>
                            <div>
                               <label className="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1.5">End Date</label>
                               <input type="date" className="w-full border-2 border-slate-100 p-3 rounded-xl font-bold text-slate-700 outline-none" value={newTask.endDate} onChange={e => setNewTask({...newTask, endDate: e.target.value})} />
                            </div>
                         </div>
                      </div>
                      <div className="p-6 border-t bg-slate-50 flex justify-between gap-3">
                         {editingId && (
                           <button onClick={() => { 
                             const updated = tasks.filter(t => t.id !== editingId);
                             updateTasksWithHistory(updated);
                             setIsModalOpen(false); 
                             showNotification("Item deleted");
                           }} className="text-red-600 font-bold hover:bg-red-50 px-4 py-2 rounded-xl transition-colors">Delete Item</button>
                         )}
                         <div className="flex gap-2 ml-auto">
                            <button onClick={() => setIsModalOpen(false)} className="px-5 py-2 font-bold text-slate-400 hover:text-slate-600 transition-colors">Cancel</button>
                            <button onClick={handleSaveTask} className="bg-blue-600 text-white px-8 py-3 rounded-xl font-black shadow-lg hover:bg-blue-700 active:scale-95 transition-all uppercase tracking-tighter">Save Changes</button>
                         </div>
                      </div>
                   </div>
                </div>
              )}

              {notification && (
                <div className="fixed bottom-8 right-8 bg-slate-900 text-white px-6 py-4 rounded-2xl shadow-2xl z-[200] flex items-center gap-3 animate-in slide-in-from-bottom-6 duration-300 border border-white/10">
                  <div className="w-2 h-2 rounded-full bg-green-400 animate-pulse"></div>
                  <span className="text-sm font-bold tracking-tight">{notification}</span>
                </div>
              )}
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ComplianceGantt />);
    </script>
</body>
</html>
