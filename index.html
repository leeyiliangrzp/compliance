<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compliance Workplan FY 26/27</title>
    
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-database-compat.js"></script>

    <style>
        body { margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        .overflow-visible { overflow: visible !important; }
        .prose h1, .prose h2, .prose h3 { margin-top: 1.5em; margin-bottom: 0.5em; color: #1e293b; }
        .prose p { margin-top: 0.5em; margin-bottom: 0.5em; }
        .prose ul { margin-top: 0.5em; margin-bottom: 1em; }
        .prose li { margin-top: 0.25em; margin-bottom: 0.25em; }
        .select-text { user-select: text !important; -webkit-user-select: text !important; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useRef, useEffect } = React;

        const SVGIcon = ({ d, children, size=24, className="" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                {d ? <path d={d} /> : children}
            </svg>
        );

        const IconPlus = (p) => <SVGIcon {...p}><path d="M5 12h14"/><path d="M12 5v14"/></SVGIcon>;
        const IconTrash2 = (p) => <SVGIcon {...p}><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></SVGIcon>;
        const IconLayoutList = (p) => <SVGIcon {...p}><rect width="7" height="7" x="3" y="3" rx="1"/><rect width="7" height="7" x="3" y="14" rx="1"/><path d="M14 4h7"/><path d="M14 9h7"/><path d="M14 15h7"/><path d="M14 20h7"/></SVGIcon>;
        const IconBarChart3 = (p) => <SVGIcon {...p}><path d="M3 3v18h18"/><path d="M18 17V9"/><path d="M13 17V5"/><path d="M8 17v-3"/></SVGIcon>;
        const IconEdit = (p) => <SVGIcon {...p}><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></SVGIcon>;
        const IconX = (p) => <SVGIcon {...p}><path d="M18 6 6 18"/><path d="m6 6 12 12"/></SVGIcon>;
        const IconUndo = (p) => <SVGIcon {...p}><path d="M3 7v6h6"/><path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"/></SVGIcon>;
        const IconRedo = (p) => <SVGIcon {...p}><path d="M21 7v6h-6"/><path d="M3 17a9 9 0 0 1 9-9 9 9 0 0 1 6 2.3l3 2.7"/></SVGIcon>;
        const IconDownload = (p) => <SVGIcon {...p}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></SVGIcon>;
        const IconUpload = (p) => <SVGIcon {...p}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></SVGIcon>;
        const IconRefreshCw = (p) => <SVGIcon {...p}><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></SVGIcon>;
        const IconFilter = (p) => <SVGIcon {...p}><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></SVGIcon>;
        const IconMaximize = (p) => <SVGIcon {...p}><path d="M8 3H5a2 2 0 0 0-2 2v3"/><path d="M21 8V5a2 2 0 0 0-2-2h-3"/><path d="M3 16v3a2 2 0 0 0 2 2h3"/><path d="M16 21h3a2 2 0 0 0 2-2v-3"/></SVGIcon>;
        const IconMinimize = (p) => <SVGIcon {...p}><path d="M8 3v3a2 2 0 0 1-2 2H3"/><path d="M21 8h-3a2 2 0 0 1-2-2V3"/><path d="M3 16h3a2 2 0 0 1 2 2v3"/><path d="M16 21v-3a2 2 0 0 1 2-2h3"/></SVGIcon>;
        const IconGripHorizontal = (p) => <SVGIcon {...p}><circle cx="12" cy="9" r="1"/><circle cx="19" cy="9" r="1"/><circle cx="5" cy="9" r="1"/><circle cx="12" cy="15" r="1"/><circle cx="19" cy="15" r="1"/><circle cx="5" cy="15" r="1"/></SVGIcon>;
        const IconClock = (p) => <SVGIcon {...p}><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></SVGIcon>;
        const IconGlobe = (p) => <SVGIcon {...p}><circle cx="12" cy="12" r="10"/><line x1="2" x2="22" y1="12" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></SVGIcon>;
        const IconPieChart = (p) => <SVGIcon {...p}><path d="M21.21 15.89A10 10 0 1 1 8 2.83"/><path d="M22 12A10 10 0 0 0 12 2v10z"/></SVGIcon>;
        const IconBrain = (p) => <SVGIcon {...p}><path d="M9.5 2A2.5 2.5 0 0 1 12 4.5v15a2.5 2.5 0 0 1-4.96.44 2.5 2.5 0 0 1-2.96-3.08 3 3 0 0 1-.34-5.58 2.5 2.5 0 0 1 1.32-4.24 2.5 2.5 0 0 1 1.98-3A2.5 2.5 0 0 1 9.5 2Z"/><path d="M14.5 2A2.5 2.5 0 0 0 12 4.5v15a2.5 2.5 0 0 0 4.96.44 2.5 2.5 0 0 0 2.96-3.08 3 3 0 0 0 .34-5.58 2.5 2.5 0 0 0-1.32-4.24 2.5 2.5 0 0 0-1.98-3A2.5 2.5 0 0 0 14.5 2Z"/></SVGIcon>;
        const IconKey = (p) => <SVGIcon {...p}><path d="m15.5 7.5 2.3 2.3a1 1 0 0 0 1.4 0l2.1-2.1a1 1 0 0 0 0-1.4L19 4"/><path d="m21 2-9.6 9.6"/><circle cx="7.5" cy="15.5" r="5.5"/></SVGIcon>;
        const IconSparkles = (p) => <SVGIcon {...p}><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/><path d="M5 3v4"/><path d="M19 17v4"/><path d="M3 5h4"/><path d="M17 19h4"/></SVGIcon>;
        const IconChevronDown = (p) => <SVGIcon {...p}><path d="m6 9 6 6 6-6"/></SVGIcon>;

        // --- Constants ---
        const CLASSIFICATIONS = ['Governance & Oversight', 'Risk Assessment & Framework', 'Systems & Technology', 'Operational Processes', 'Team Training', 'Regulatory Readiness'];
        const STATUSES = ['Not Started', 'In Progress', 'Completed'];
        const DEPENDENCIES = ['RISPL', 'External'];
        const DEPARTMENTS = ['Finance', 'Product', 'Legal', 'Risk', 'Operations', 'IT'];
        const SCHEDULE_TYPES = ['Absolute Date', 'T + X Trigger'];
        const TRIGGER_EVENTS = ['IPA', 'Final License Grant', 'Go-Live'];
        const CLASSIFICATION_COLORS = { 'Governance & Oversight': 'bg-purple-500', 'Risk Assessment & Framework': 'bg-red-500', 'Systems & Technology': 'bg-blue-500', 'Operational Processes': 'bg-emerald-500', 'Team Training': 'bg-yellow-500', 'Regulatory Readiness': 'bg-orange-500' };
        const STATUS_COLORS = { 'Not Started': 'bg-gray-200 text-gray-700 border-gray-300', 'In Progress': 'bg-blue-100 text-blue-800 border-blue-300', 'Completed': 'bg-green-100 text-green-800 border-green-300' };
        const FY_START_YEAR = 2026;
        const FY_START_MONTH = 3; 

        const generateId = () => typeof crypto !== 'undefined' && crypto.randomUUID ? crypto.randomUUID() : Date.now().toString(36) + Math.random().toString(36).substring(2);

        function ComplianceGantt() {
          const [tasks, setTasks] = useState([]);
          const [history, setHistory] = useState([]);
          const [historyStep, setHistoryStep] = useState(-1);
          const [view, setView] = useState('timeline');
          const [isModalOpen, setIsModalOpen] = useState(false);
          const [editingId, setEditingId] = useState(null);
          const [loading, setLoading] = useState(true);
          const [notification, setNotification] = useState('');
          const [showFilters, setShowFilters] = useState(false);
          const [isFullscreen, setIsFullscreen] = useState(false);
          const [isPdfMode, setIsPdfMode] = useState(false);
          const [timelineScale, setTimelineScale] = useState('months');
          const [apiKey, setApiKey] = useState('');
          const [aiResponse, setAiResponse] = useState('');
          const [isAiLoading, setIsAiLoading] = useState(false);
          const [customPrompt, setCustomPrompt] = useState('');
          const [newTask, setNewTask] = useState({ title: '', description: '', classification: CLASSIFICATIONS[0], status: STATUSES[0], dependency: DEPENDENCIES[0], department: '', scheduleType: 'Absolute Date', triggerEvent: TRIGGER_EVENTS[0], triggerOffset: 30, startDate: '2026-04-01', endDate: '2026-04-30' });
          const [dragState, setDragState] = useState(null);
          const [activeFilters, setActiveFilters] = useState({ classification: 'All', status: 'All', dependency: 'All', department: 'All' });
          const [sortBy, setSortBy] = useState('default');

          const isRemoteUpdate = useRef(false);
          const containerRef = useRef(null);
          const timelineGridRef = useRef(null);
          const exportMenuRef = useRef(null);

          // --- History (Undo/Redo) Logic ---
          const saveToHistory = (newTasks) => {
            const nextHistory = history.slice(0, historyStep + 1);
            nextHistory.push(JSON.stringify(newTasks));
            if (nextHistory.length > 50) nextHistory.shift(); 
            setHistory(nextHistory);
            setHistoryStep(nextHistory.length - 1);
          };

          const undo = () => {
            if (historyStep > 0) {
              const prevTasks = JSON.parse(history[historyStep - 1]);
              isRemoteUpdate.current = false; 
              setTasks(prevTasks);
              setHistoryStep(historyStep - 1);
              showNotification("Undo successful");
            }
          };

          const redo = () => {
            if (historyStep < history.length - 1) {
              const nextTasks = JSON.parse(history[historyStep + 1]);
              isRemoteUpdate.current = false;
              setTasks(nextTasks);
              setHistoryStep(historyStep + 1);
              showNotification("Redo successful");
            }
          };

          // Shortcuts for Undo/Redo
          useEffect(() => {
            const handleKeyDown = (e) => {
              if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'z') {
                e.preventDefault();
                undo();
              }
              if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'y') {
                e.preventDefault();
                redo();
              }
            };
            window.addEventListener('keydown', handleKeyDown);
            return () => window.removeEventListener('keydown', handleKeyDown);
          }, [historyStep, history]);

          // Firebase Init
          useEffect(() => {
            try {
                const firebaseConfig = {
                    apiKey: "AIzaSyDBUGby8pv_YzFrED7kQm1nMydxwbzArew",
                    authDomain: "compliance-json-storage.firebaseapp.com",
                    databaseURL: "https://compliance-json-storage-default-rtdb.asia-southeast1.firebasedatabase.app",
                    projectId: "compliance-json-storage",
                    storageBucket: "compliance-json-storage.firebasestorage.app",
                    messagingSenderId: "94949340652",
                    appId: "1:94949340652:web:f49aa96d667480e7433cc9"
                };
                if (!window.firebase.apps.length) window.firebase.initializeApp(firebaseConfig);
                const db = window.firebase.database();
                const tasksRef = db.ref('sharedData/tasks');
                window.firebaseDbRef = tasksRef;

                tasksRef.on('value', (snapshot) => {
                    const data = snapshot.val();
                    isRemoteUpdate.current = true;
                    if (data) {
                        setTasks(data);
                        // Initialize history on first load
                        if (history.length === 0) {
                            setHistory([JSON.stringify(data)]);
                            setHistoryStep(0);
                        }
                    }
                    setLoading(false);
                });
            } catch (error) { console.error(error); setLoading(false); }
            const savedKey = localStorage.getItem('gemini_api_key');
            if (savedKey) setApiKey(savedKey);
          }, []);

          // Sync local changes to cloud
          useEffect(() => {
            if (!loading) {
                if (isRemoteUpdate.current) {
                    isRemoteUpdate.current = false;
                } else {
                    if (window.firebaseDbRef) {
                        const cleanTasks = JSON.parse(JSON.stringify(tasks));
                        window.firebaseDbRef.set(cleanTasks);
                        saveToHistory(tasks);
                    }
                }
            }
          }, [tasks]);

          const showNotification = (msg) => { setNotification(msg); setTimeout(() => setNotification(''), 3000); };

          // --- AI Insights Logic ---
          const fetchInsights = async (promptType) => {
              if (!apiKey) return showNotification("Enter API key first");
              setIsAiLoading(true); setAiResponse('');
              try {
                  const taskString = tasks.map(t => {
                      const isFixed = !t.scheduleType || t.scheduleType.includes('Absolute') || (t.startDate && t.endDate);
                      const sched = isFixed ? `${t.startDate} to ${t.endDate}` : `T+${t.triggerOffset} (Trigger: ${t.triggerEvent})`;
                      const dep = t.dependency === 'External' ? `External (${t.department})` : 'Internal managed';
                      return `- ${t.title} [Status: ${t.status}, Class: ${t.classification}, Schedule: ${sched}, Dep: ${dep}]`;
                  }).join('\n');
                  
                  let specificPrompt = promptType === 'Holistic' ? "Analyze workplan: 1. Key ratios/effort 2. Bottlenecks 3. Assumptions 4. Move items for better balance." : customPrompt;
                  const finalPrompt = `${specificPrompt}\n\nWorkplan Data:\n${taskString}\n\nFormatting: Use bullet points, bold key data, and structured headings. No intro filler.`;

                  const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
                      method: 'POST',
                      headers: { 'Content-Type': 'application/json' },
                      body: JSON.stringify({ contents: [{ parts: [{ text: finalPrompt }] }] })
                  });
                  const data = await response.json();
                  setAiResponse(data.candidates[0].content.parts[0].text);
              } catch (error) { setAiResponse("Error fetching insights."); }
              setIsAiLoading(false);
          };

          const processedTasks = useMemo(() => {
            let result = [...tasks];
            if (activeFilters.classification !== 'All') result = result.filter(t => t.classification === activeFilters.classification);
            if (activeFilters.status !== 'All') result = result.filter(t => t.status === activeFilters.status);
            if (activeFilters.dependency !== 'All') result = result.filter(t => (t.dependency === 'External' ? 'External' : 'RISPL') === activeFilters.dependency);
            return result;
          }, [tasks, activeFilters]);

          const getBarStyles = (task) => {
            const fyStart = new Date(FY_START_YEAR, FY_START_MONTH, 1).getTime();
            const fyEnd = new Date(FY_START_YEAR + 1, FY_START_MONTH, 0).getTime();
            const totalDuration = fyEnd - fyStart;
            let taskStart = new Date(task.startDate).getTime();
            let taskEnd = new Date(task.endDate).getTime();
            const leftPercent = ((taskStart - fyStart) / totalDuration) * 100;
            const widthPercent = ((taskEnd - taskStart) / totalDuration) * 100;
            return { left: `${leftPercent}%`, width: `${widthPercent}%` };
          };

          const handleSaveTask = () => {
            if (editingId) setTasks(tasks.map(t => t.id === editingId ? { ...newTask, id: editingId } : t));
            else setTasks([...tasks, { ...newTask, id: generateId() }]);
            setIsModalOpen(false);
          };

          const openEditModal = (task) => { setEditingId(task.id); setNewTask(task); setIsModalOpen(true); };

          return (
            <div ref={containerRef} className="flex flex-col bg-slate-50 text-slate-900 h-screen relative">
              
              {/* HEADER */}
              <div className="bg-white border-b border-slate-200 shadow-sm p-4 flex justify-between items-center z-50">
                <div className="flex items-center gap-4">
                  <div>
                    <h1 className="text-xl font-bold text-slate-800">Compliance Workplan FY 26/27</h1>
                    <div className="flex items-center gap-3 mt-1">
                       <span className="text-xs font-bold bg-blue-100 text-blue-700 px-2 py-0.5 rounded-full border border-blue-200">{tasks.length} Total Items</span>
                       <div className="flex items-center gap-2 text-[10px] uppercase tracking-wider font-bold text-slate-400 border-l pl-3">
                          <span className="flex items-center gap-1"><div className="w-2 h-2 rounded-full bg-red-600"></div> External/Group</span>
                          <span className="flex items-center gap-1 ml-2"><div className="w-2 h-2 rounded-full bg-slate-900"></div> Internal RISPL</span>
                       </div>
                    </div>
                  </div>
                </div>

                <div className="flex items-center gap-2">
                    <div className="flex bg-slate-100 p-1 rounded-lg border border-slate-200 mr-4">
                      <button onClick={undo} disabled={historyStep <= 0} className="p-1.5 rounded-md hover:bg-white disabled:opacity-30 transition-all text-slate-600" title="Undo (Ctrl+Z)"><IconUndo size={18} /></button>
                      <button onClick={redo} disabled={historyStep >= history.length - 1} className="p-1.5 rounded-md hover:bg-white disabled:opacity-30 transition-all text-slate-600" title="Redo (Ctrl+Y)"><IconRedo size={18} /></button>
                    </div>

                    <div className="flex bg-slate-100 p-1 rounded-lg border border-slate-200">
                        <button onClick={() => setView('timeline')} className={`px-3 py-1.5 rounded-md text-sm font-medium ${view === 'timeline' ? 'bg-white shadow-sm text-blue-600' : 'text-slate-500'}`}>Timeline</button>
                        <button onClick={() => setView('list')} className={`px-3 py-1.5 rounded-md text-sm font-medium ${view === 'list' ? 'bg-white shadow-sm text-blue-600' : 'text-slate-500'}`}>List</button>
                        <button onClick={() => setView('ai')} className={`px-3 py-1.5 rounded-md text-sm font-medium ${view === 'ai' ? 'bg-white shadow-sm text-blue-600' : 'text-slate-500'}`}>AI Insights</button>
                    </div>

                    <button onClick={openAddModal} className="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg text-sm font-medium flex items-center gap-2 shadow-sm ml-2">
                        <IconPlus size={18} /> <span>Add Item</span>
                    </button>
                </div>
              </div>

              {/* MAIN CONTENT */}
              <div className="flex-1 overflow-hidden p-6 flex flex-col">
                
                {view === 'timeline' && (
                  <div className="flex-1 bg-white rounded-xl border border-slate-200 shadow-sm flex flex-col overflow-auto select-none">
                    <div className="min-w-[1200px]">
                        <div className="flex border-b bg-slate-50 sticky top-0 z-10">
                           <div className="w-72 p-3 border-r font-bold text-sm text-slate-600">Action Item</div>
                           <div className="flex-1 flex">
                             {Array.from({length: 12}).map((_, i) => (
                               <div key={i} className="flex-1 border-r p-2 text-center text-[10px] font-bold text-slate-400 uppercase">
                                 {new Date(2026, 3 + i, 1).toLocaleString('default', { month: 'short' })}
                               </div>
                             ))}
                           </div>
                        </div>
                        <div className="relative">
                          {processedTasks.map(t => (
                            <div key={t.id} className="flex border-b hover:bg-slate-50 group">
                              <div className="w-72 p-3 border-r flex items-center gap-2 cursor-pointer" onClick={() => openEditModal(t)}>
                                <div className={`w-1.5 h-6 rounded-full ${t.dependency === 'External' ? 'bg-red-600' : 'bg-slate-900'}`}></div>
                                <span className={`text-sm font-bold truncate ${t.dependency === 'External' ? 'text-red-700' : 'text-slate-800'}`}>{t.title}</span>
                              </div>
                              <div className="flex-1 relative h-12">
                                <div className={`absolute h-7 top-2.5 rounded shadow-sm flex items-center px-2 cursor-pointer ${CLASSIFICATION_COLORS[t.classification]}`} style={getBarStyles(t)} onClick={() => openEditModal(t)}>
                                   <span className="text-[10px] text-white font-bold truncate">{t.title}</span>
                                </div>
                              </div>
                            </div>
                          ))}
                        </div>
                    </div>
                  </div>
                )}

                {view === 'ai' && (
                  <div className="flex-1 flex gap-6 overflow-hidden">
                    <div className="w-1/3 flex flex-col gap-4">
                       <div className="bg-white p-6 rounded-xl border border-slate-200 shadow-sm">
                          <h2 className="font-bold text-lg mb-4 flex items-center gap-2 text-indigo-700"><IconBrain /> AI Consultant</h2>
                          <div className="space-y-3">
                             <button onClick={() => fetchInsights('Holistic')} className="w-full text-left p-3 border rounded-lg hover:bg-indigo-50 transition-all font-medium text-sm">Strategic Holistic Review</button>
                             <div className="pt-4 border-t">
                                <label className="text-xs font-bold text-slate-400 uppercase">Custom Analysis</label>
                                <textarea className="w-full border rounded-lg p-3 mt-2 text-sm h-32 focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="e.g. Which team training items are missing dependencies?" value={customPrompt} onChange={e => setCustomPrompt(e.target.value)} />
                                <button onClick={() => fetchInsights('Custom')} className="w-full bg-indigo-600 text-white mt-3 py-2 rounded-lg font-bold text-sm">Ask Question</button>
                             </div>
                          </div>
                       </div>
                    </div>
                    <div className="flex-1 bg-white rounded-xl border border-slate-200 shadow-sm p-8 overflow-auto select-text">
                       {isAiLoading ? (
                          <div className="h-full flex flex-col items-center justify-center text-indigo-400">
                             <IconRefreshCw className="animate-spin mb-2" size={32} />
                             <span className="font-bold animate-pulse">Analyzing Compliance Data...</span>
                          </div>
                       ) : aiResponse ? (
                          <div className="prose prose-slate max-w-none [&>ul]:list-disc [&>ul]:pl-5 [&>ol]:list-decimal select-text">
                             <MarkdownParser text={aiResponse} />
                          </div>
                       ) : (
                          <div className="h-full flex flex-col items-center justify-center text-slate-300 italic">Select a prompt on the left to begin analysis.</div>
                       )}
                    </div>
                  </div>
                )}
              </div>

              {/* MODALS */}
              {isModalOpen && (
                <div className="fixed inset-0 bg-black/50 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
                   <div className="bg-white rounded-2xl shadow-2xl w-full max-w-lg overflow-hidden border border-slate-300">
                      <div className="p-6 border-b flex justify-between items-center bg-slate-50">
                         <h2 className="font-bold text-xl">{editingId ? 'Edit Item' : 'New Compliance Task'}</h2>
                         <button onClick={() => setIsModalOpen(false)}><IconX /></button>
                      </div>
                      <div className="p-6 space-y-4">
                         <div>
                            <label className="block text-xs font-bold text-slate-400 uppercase mb-1">Task Title</label>
                            <input className="w-full border p-2.5 rounded-lg font-medium" value={newTask.title} onChange={e => setNewTask({...newTask, title: e.target.value})} />
                         </div>
                         <div className="grid grid-cols-2 gap-4">
                            <div>
                               <label className="block text-xs font-bold text-slate-400 uppercase mb-1">Dependency Type</label>
                               <select className="w-full border p-2.5 rounded-lg" value={newTask.dependency} onChange={e => setNewTask({...newTask, dependency: e.target.value})}>
                                  <option value="RISPL">Internal managed</option>
                                  <option value="External">External/Group</option>
                               </select>
                            </div>
                            {newTask.dependency === 'External' && (
                              <div>
                                 <label className="block text-xs font-bold text-red-400 uppercase mb-1">Department</label>
                                 <select className="w-full border border-red-200 p-2.5 rounded-lg bg-red-50" value={newTask.department} onChange={e => setNewTask({...newTask, department: e.target.value})}>
                                    <option value="">Select Department</option>
                                    {DEPARTMENTS.map(d => <option key={d} value={d}>{d}</option>)}
                                 </select>
                              </div>
                            )}
                         </div>
                         <div className="grid grid-cols-2 gap-4 pt-4 border-t">
                            <div>
                               <label className="block text-xs font-bold text-slate-400 uppercase mb-1">Start Date</label>
                               <input type="date" className="w-full border p-2 rounded-lg" value={newTask.startDate} onChange={e => setNewTask({...newTask, startDate: e.target.value})} />
                            </div>
                            <div>
                               <label className="block text-xs font-bold text-slate-400 uppercase mb-1">End Date</label>
                               <input type="date" className="w-full border p-2 rounded-lg" value={newTask.endDate} onChange={e => setNewTask({...newTask, endDate: e.target.value})} />
                            </div>
                         </div>
                      </div>
                      <div className="p-6 border-t bg-slate-50 flex justify-between gap-3">
                         {editingId && (
                           <button onClick={() => { setTasks(tasks.filter(t => t.id !== editingId)); setIsModalOpen(false); }} className="text-red-600 font-bold hover:bg-red-50 px-4 rounded-lg">Delete</button>
                         )}
                         <div className="flex gap-2 ml-auto">
                            <button onClick={() => setIsModalOpen(false)} className="px-4 py-2 font-medium text-slate-500">Cancel</button>
                            <button onClick={handleSaveTask} className="bg-blue-600 text-white px-6 py-2 rounded-lg font-bold">Save Task</button>
                         </div>
                      </div>
                   </div>
                </div>
              )}

              {notification && (
                <div className="fixed bottom-6 right-6 bg-slate-900 text-white px-5 py-3 rounded-xl shadow-2xl z-[200] flex items-center gap-3 animate-in slide-in-from-bottom-4">
                  <IconCheckCircle2 className="text-green-400" size={18} />
                  <span className="text-sm font-bold">{notification}</span>
                </div>
              )}
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ComplianceGantt />);
    </script>
</body>
</html>
